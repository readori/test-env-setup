name: Build and Manage with asc-cli

on:
  workflow_dispatch:
    inputs:
      app_scheme:
        description: "SPM / xcodebuild scheme name"
        required: false
        default: "Readori"
        type: string
      xcode_version:
        description: "Xcode version (e.g. 16.2, empty uses runner default)"
        required: false
        default: ""
        type: string
      generate_icons:
        description: "Whether to run icon generation script"
        required: false
        default: "yes"
        type: choice
        options:
          - "yes"
          - "no"
      run_asc_tasks:
        description: "Whether to run App Store Connect tasks (requires secrets)"
        required: false
        default: "no"
        type: choice
        options:
          - "yes"
          - "no"
      app_bundle_identifier:
        description: "Bundle identifier for packaging"
        required: false
        default: "com.readori.app"
        type: string

permissions:
  contents: read

concurrency:
  group: build-remote-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-manage:
    name: Build and asc-cli Integration
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.PRIVATE_REPO_KEY }}
          known_hosts: "github.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK3pzfEjVuG0d+XmQYsvcsXXMU3K0RTGmi5mKVp+dLAx"

      - name: Clone Private Repository
        run: |
          git clone --depth=1 git@github.com:readori/readori.git core_project
          echo "[clone] Done. Ref: $(git -C core_project rev-parse --short HEAD)"

      - name: Select Xcode (optional)
        if: ${{ github.event.inputs.xcode_version != '' }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ github.event.inputs.xcode_version }}

      - name: Environment Diagnostics
        run: |
          xcodebuild -version
          swift --version
          echo "--- Top-level structure ---"
          ls -1 core_project/
          echo "--- Scripts ---"
          ls -1 core_project/scripts/ 2>/dev/null || echo "(no scripts dir)"

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            core_project/.build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/Readori-*/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('core_project/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve Swift packages
        run: |
          cd core_project
          swift package resolve

      - name: Generate app icons
        if: ${{ github.event.inputs.generate_icons == 'yes' }}
        run: |
          if [[ -f "core_project/scripts/generate_icons.swift" ]]; then
            swift core_project/scripts/generate_icons.swift "${GITHUB_WORKSPACE}/core_project"
          else
            echo "Warning: generate_icons.swift not found, skipping."
          fi

      - name: Build unsigned IPA
        env:
          ALLOW_WRAPPED_APP: "1"
          APP_BUNDLE_IDENTIFIER: "${{ github.event.inputs.app_bundle_identifier }}"
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/build"
          cd core_project
          chmod +x scripts/build_unsigned_ipa.sh
          ./scripts/build_unsigned_ipa.sh \
            "${{ github.event.inputs.app_scheme }}" \
            "${GITHUB_WORKSPACE}/build"

      - name: Install asc-cli
        if: ${{ github.event.inputs.run_asc_tasks == 'yes' }}
        run: |
          brew tap tddworks/tap
          brew install asccli

      - name: Authenticate asc-cli
        if: ${{ github.event.inputs.run_asc_tasks == 'yes' }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.ASC_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          asc auth login \
            --key-id ${{ secrets.ASC_KEY_ID }} \
            --issuer-id ${{ secrets.ASC_ISSUER_ID }} \
            --p8-path ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Run asc-cli Commands
        if: ${{ github.event.inputs.run_asc_tasks == 'yes' }}
        run: |
          echo "--- Validate API connection ---"
          asc auth list
          echo "--- List apps ---"
          asc app list --limit 5

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: readori-build-${{ github.run_number }}
          retention-days: 1
          if-no-files-found: warn
          path: |
            build/*.ipa
            build/xcodebuild.log
