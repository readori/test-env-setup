name: Readori CI v7 (xcodebuild Industrial)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "unsigned | testflight | submit | screenshots | ai-screenshots"
        default: "unsigned"
        type: choice
        options:
          - unsigned
          - testflight
          - submit
          - screenshots
          - ai-screenshots

      app_scheme:
        default: "Readori"
        type: string

      app_version:
        default: "1.0.0"
        type: string

      configuration:
        default: "Release"
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14

    env:
      MODE: ${{ github.event.inputs.mode }}
      SCHEME: ${{ github.event.inputs.app_scheme }}
      APP_VERSION: ${{ github.event.inputs.app_version }}
      CONFIGURATION: ${{ github.event.inputs.configuration }}

    steps:

    # =========================
    # SSH
    # =========================
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.PRIVATE_REPO_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan github.com >> ~/.ssh/known_hosts

    # =========================
    # Clone repo
    # =========================
    - name: Clone repository
      run: |
        git clone --depth=1 git@github.com:readori/readori.git core_project

    # =========================
    # Install tools
    # =========================
    - name: Install tools
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        brew install asccli

    # =========================
    # ASC auth
    # =========================
    - name: ASC auth
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys

        echo "${{ secrets.ASC_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

        asc auth login \
          --key-id ${{ secrets.ASC_KEY_ID }} \
          --issuer-id ${{ secrets.ASC_ISSUER_ID }} \
          --private-key-path ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

    # =========================
    # Build number
    # =========================
    - name: Generate build number
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        BN=$(asc builds list --app-id ${{ secrets.ASC_APP_ID }} --output json | python3 -c "import sys,json; b=json.load(sys.stdin); nums=[int(x.get('buildNumber')) for x in b if x.get('buildNumber') and str(x.get('buildNumber')).isdigit()]; print(max(nums)+1 if nums else 1)")
        echo "BUILD_NUMBER=$BN" >> $GITHUB_ENV

    # =========================
    # Build IPA (xcodebuild ONLY)
    # =========================
    - name: Build IPA (xcodebuild)
      shell: bash
      run: |
        set -e

        mkdir -p build
        cd core_project

        ARCHIVE_PATH="$GITHUB_WORKSPACE/build/Readori.xcarchive"
        EXPORT_PATH="$GITHUB_WORKSPACE/build/export"

        if [[ "$MODE" == "unsigned" ]]; then
          xcodebuild \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -derivedDataPath build \
            clean build
          exit 0
        fi

        # 1. archive
        xcodebuild archive \
          -scheme "$SCHEME" \
          -configuration "$CONFIGURATION" \
          -sdk iphoneos \
          -archivePath "$ARCHIVE_PATH" \
          CURRENT_PROJECT_VERSION=${BUILD_NUMBER} \
          MARKETING_VERSION=${APP_VERSION}

        # 2. export
        xcodebuild -exportArchive \
          -archivePath "$ARCHIVE_PATH" \
          -exportPath "$EXPORT_PATH" \
          -exportOptionsPlist ExportOptions.plist

    # =========================
    # Locate IPA
    # =========================
    - name: Locate IPA
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        IPA=$(find build/export -name "*.ipa" | head -1)
        echo "IPA_PATH=$IPA" >> $GITHUB_ENV

    # =========================
    # Upload to TestFlight / ASC
    # =========================
    - name: Upload build
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        asc builds upload \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --file "$IPA_PATH" \
          --version "$APP_VERSION" \
          --build-number "$BUILD_NUMBER"

    # =========================
    # Wait build ready
    # =========================
    - name: Wait build ready
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        for i in {1..20}; do
          ID=$(asc builds list --app-id ${{ secrets.ASC_APP_ID }} --output json | python3 -c "import sys,json; b=json.load(sys.stdin); t='${BUILD_NUMBER}'; m=[x for x in b if str(x.get('buildNumber') or x.get('version'))==t]; print(m[0]['id'] if m else '')")

          if [[ -n "$ID" ]]; then
            echo "BUILD_ID=$ID" >> $GITHUB_ENV
            exit 0
          fi

          sleep 15
        done

        exit 1

    # =========================
    # Submit
    # =========================
    - name: Submit app
      if: ${{ env.MODE == 'submit' }}
      run: |
        VERSION_ID=$(asc versions list --app-id ${{ secrets.ASC_APP_ID }} --output json | python3 -c "import sys,json; v=json.load(sys.stdin); print(v[0]['id'] if v else '')")

        asc versions submit --version-id "$VERSION_ID"

    # =========================
    # Screenshots placeholder
    # =========================
    - name: Screenshots
      if: ${{ env.MODE == 'screenshots' }}
      run: |
        echo "Screenshots upload mode (hook ready)"
        echo "Put screenshots in core_project/screenshots"

    # =========================
    # AI screenshots placeholder
    # =========================
    - name: AI screenshots
      if: ${{ env.MODE == 'ai-screenshots' }}
      run: |
        echo "AI screenshot pipeline placeholder"
        mkdir -p core_project/screenshots

    # =========================
    # Artifact
    # =========================
    - name: Upload artifact
      if: ${{ env.MODE != 'screenshots' }}
      uses: actions/upload-artifact@v4
      with:
        name: readori-v7
        path: build
