name: Build and Manage with asc-cli (Industrial CI)

on:
  workflow_dispatch:
    inputs:
      app_scheme:
        description: "SPM / xcodebuild scheme name"
        required: false
        default: "Readori"
        type: string

      xcode_version:
        description: "Xcode version"
        required: false
        default: ""
        type: string

      generate_icons:
        description: "Generate icons"
        required: false
        default: "yes"
        type: choice
        options: ["yes", "no"]

      run_asc_tasks:
        description: "Run App Store Connect upload"
        required: false
        default: "yes"
        type: choice
        options: ["yes", "no"]

      app_bundle_identifier:
        description: "Bundle ID"
        required: false
        default: "com.readori.app"
        type: string

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build-and-manage:
    runs-on: macos-14
    timeout-minutes: 90

    steps:

    # =========================
    # 1. Checkout private repo
    # =========================
    - name: Setup SSH
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.PRIVATE_REPO_KEY }}
        known_hosts: github.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK3pzfEjVuG0d+XmQYsvcsXXMU3K0RTGmi5mKVp+dLAx

    - name: Clone repo
      run: |
        git clone --depth=1 git@github.com:readori/readori.git core_project
        cd core_project
        git rev-parse --short HEAD

    # =========================
    # 2. Xcode setup
    # =========================
    - name: Select Xcode (optional)
      if: ${{ github.event.inputs.xcode_version != '' }}
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ github.event.inputs.xcode_version }}

    - name: Diagnostics
      run: |
        xcodebuild -version
        swift --version

    # =========================
    # 3. Install tools
    # =========================
    - name: Install dependencies
      run: |
        brew install fastlane || true
        brew tap tddworks/tap
        brew install asccli

    # =========================
    # 4. Setup Keychain (CRITICAL)
    # =========================
    - name: Setup Keychain
      run: |
        security create-keychain -p "" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain

    # =========================
    # 5. Install certificate (p12)
    # =========================
    - name: Install Certificate
      run: |
        echo "${{ secrets.IOS_CERTIFICATE }}" | base64 --decode > cert.p12

        security import cert.p12 \
          -k build.keychain \
          -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" \
          -T /usr/bin/codesign \
          -T /usr/bin/security

        security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

    # =========================
    # 6. Install provisioning profile
    # =========================
    - name: Install Provisioning Profile
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

        echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode > profile.mobileprovision

        UUID=$(grep -a -A1 UUID profile.mobileprovision | grep -o "[-A-F0-9]\{36\}" | head -1)

        cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

    # =========================
    # 7. Resolve Swift packages
    # =========================
    - name: Swift Package Resolve
      run: |
        cd core_project
        swift package resolve

    # =========================
    # 8. Generate icons (optional)
    # =========================
    - name: Generate icons
      if: ${{ github.event.inputs.generate_icons == 'yes' }}
      run: |
        cd core_project
        if [[ -f "scripts/generate_icons.swift" ]]; then
          swift scripts/generate_icons.swift
        fi

    # =========================
    # 9. Build SIGNED IPA
    # =========================
    - name: Build Archive + Export IPA
      run: |
        cd core_project

        mkdir -p build

        xcodebuild archive \
          -scheme "${{ github.event.inputs.app_scheme }}" \
          -archivePath build/app.xcarchive \
          -allowProvisioningUpdates \
          DEVELOPMENT_TEAM=${{ secrets.ASC_TEAM_ID }} \
          CODE_SIGN_STYLE=Manual

        xcodebuild -exportArchive \
          -archivePath build/app.xcarchive \
          -exportPath build \
          -exportOptionsPlist ExportOptions.plist

    # =========================
    # 10. ASC CLI auth
    # =========================
    - name: Authenticate ASC CLI
      if: ${{ github.event.inputs.run_asc_tasks == 'yes' }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys

        echo "${{ secrets.ASC_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

        asc auth login \
          --key-id ${{ secrets.ASC_KEY_ID }} \
          --issuer-id ${{ secrets.ASC_ISSUER_ID }} \
          --p8-path ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

    # =========================
    # 11. Upload to TestFlight
    # =========================
    - name: Upload IPA to TestFlight
      if: ${{ github.event.inputs.run_asc_tasks == 'yes' }}
      run: |
        asc build upload --path core_project/build/*.ipa

    # =========================
    # 12. Optional submit
    # =========================
    - name: Submit to Review
      if: ${{ github.event.inputs.run_asc_tasks == 'yes' }}
      run: |
        asc app submit || true

    # =========================
    # 13. Upload artifact
    # =========================
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: core_project/build/*.ipa
