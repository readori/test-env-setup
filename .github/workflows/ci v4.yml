name: Readori CI v4 (Industrial)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "unsigned | testflight | submit | screenshots"
        default: "unsigned"
        type: choice
        options: [unsigned, testflight, submit, screenshots]

      app_scheme:
        default: "Readori"
        type: string

      app_version:
        default: "1.0.0"
        type: string

      beta_notes:
        default: ""
        type: string

      whats_new_en:
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14

    env:
      MODE: ${{ github.event.inputs.mode }}
      SCHEME: ${{ github.event.inputs.app_scheme }}
      APP_VERSION: ${{ github.event.inputs.app_version }}

    steps:

    # =========================
    # SSH（单 key）
    # =========================
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.PRIVATE_REPO_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan github.com >> ~/.ssh/known_hosts

    # =========================
    # Clone
    # =========================
    - name: Clone repo
      run: |
        git clone --depth=1 git@github.com:readori/readori.git core_project

    # =========================
    # 安装工具
    # =========================
    - name: Install tools
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        brew install fastlane
        brew tap tddworks/tap
        brew install asccli

    # =========================
    # ASC 登录
    # =========================
    - name: ASC Login
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "${{ secrets.ASC_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

        asc auth login \
          --key-id ${{ secrets.ASC_KEY_ID }} \
          --issuer-id ${{ secrets.ASC_ISSUER_ID }} \
          --private-key-path ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

    # =========================
    # Build Number（修复版）
    # =========================
    - name: Generate build number
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        BN=$(asc builds list \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --output json | \
          python3 -c "
import sys,json
builds=json.load(sys.stdin)
nums=[]
for b in builds:
    v=b.get('buildNumber') or b.get('version')
    if v and str(v).isdigit():
        nums.append(int(v))
print(max(nums)+1 if nums else 1)
")
        echo "BUILD_NUMBER=$BN" >> $GITHUB_ENV

    # =========================
    # Match
    # =========================
    - name: Match
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      run: |
        cd core_project
        fastlane match appstore \
          --git_url git@github.com:readori/readori-certificates.git \
          --type appstore \
          --readonly

    # =========================
    # Build
    # =========================
    - name: Build IPA
      run: |
        mkdir -p build
        cd core_project

        if [[ "${MODE}" == "unsigned" ]]; then
          chmod +x scripts/build_unsigned_ipa.sh
          ./scripts/build_unsigned_ipa.sh "$SCHEME" "${GITHUB_WORKSPACE}/build"
        else
          fastlane gym \
            --scheme "$SCHEME" \
            --output_directory "${GITHUB_WORKSPACE}/build" \
            --export_method app-store \
            --xcargs "CURRENT_PROJECT_VERSION=${BUILD_NUMBER} MARKETING_VERSION=${APP_VERSION}"
        fi

    # =========================
    # 上传（带 retry）
    # =========================
    - name: Upload build
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        retry() {
          for i in {1..5}; do
            "$@" && return 0
            echo "Retry $i..."
            sleep 15
          done
          return 1
        }

        IPA=$(find build -name "*.ipa" | head -1)

        retry asc builds upload \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --file "$IPA" \
          --version "${APP_VERSION}" \
          --build-number "${BUILD_NUMBER}"

    # =========================
    # 等待 build ready（核心）
    # =========================
    - name: Wait build ready
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        for i in {1..20}; do
          ID=$(asc builds list \
            --app-id ${{ secrets.ASC_APP_ID }} \
            --output json | \
            python3 -c "
import sys,json
builds=json.load(sys.stdin)
target='${BUILD_NUMBER}'
m=[b for b in builds if str(b.get('buildNumber') or b.get('version'))==target]
print(m[0]['id'] if m else '')
")
          if [[ -n "$ID" ]]; then
            echo "BUILD_ID=$ID" >> $GITHUB_ENV
            exit 0
          fi
          echo "Waiting build..."
          sleep 15
        done
        exit 1

    # =========================
    # Beta Notes
    # =========================
    - name: Beta Notes
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        if [[ -n "${{ github.event.inputs.beta_notes }}" ]]; then
          asc builds update-beta-notes \
            --build-id "$BUILD_ID" \
            --whats-new "${{ github.event.inputs.beta_notes }}"
        fi

    # =========================
    # Submit
    # =========================
    - name: Submit App
      if: ${{ env.MODE == 'submit' }}
      run: |
        VERSION_ID=$(asc versions list \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --output json | \
          python3 -c "
import sys,json
v=json.load(sys.stdin)
print(v[0]['id'] if v else '')
")
        asc versions submit --version-id "$VERSION_ID"

    # =========================
    # Artifact
    # =========================
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: build/*.ipa
