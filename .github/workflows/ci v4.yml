name: Readori CI v4 (Industrial + Screenshots Stable)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "unsigned | testflight | submit | screenshots"
        default: "unsigned"
        type: choice
        options:
          - unsigned
          - testflight
          - submit
          - screenshots

      app_scheme:
        default: "Readori"
        type: string

      app_version:
        default: "1.0.0"
        type: string

      beta_notes:
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14

    env:
      MODE: ${{ github.event.inputs.mode }}
      SCHEME: ${{ github.event.inputs.app_scheme }}
      APP_VERSION: ${{ github.event.inputs.app_version }}

    steps:

    # =========================
    # SSH
    # =========================
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.PRIVATE_REPO_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan github.com >> ~/.ssh/known_hosts

    # =========================
    # Clone
    # =========================
    - name: Clone repo
      run: |
        git clone --depth=1 git@github.com:readori/readori.git core_project

    # =========================
    # Install tools
    # =========================
    - name: Install tools
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        brew install fastlane
        brew tap tddworks/tap
        brew install asccli

    # =========================
    # ASC Login
    # =========================
    - name: ASC Login
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "${{ secrets.ASC_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

        asc auth login \
          --key-id ${{ secrets.ASC_KEY_ID }} \
          --issuer-id ${{ secrets.ASC_ISSUER_ID }} \
          --private-key-path ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

    # =========================
    # Build Number
    # =========================
    - name: Generate build number
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        BN=$(asc builds list \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --output json | python3 - <<EOF
import sys, json
builds = json.load(sys.stdin)
nums = []
for b in builds:
    v = b.get('buildNumber') or b.get('version')
    if v and str(v).isdigit():
        nums.append(int(v))
print(max(nums)+1 if nums else 1)
EOF
)
        echo "BUILD_NUMBER=$BN" >> $GITHUB_ENV

    # =========================
    # Match
    # =========================
    - name: Match
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      run: |
        cd core_project
        fastlane match appstore \
          --git_url git@github.com:readori/readori-certificates.git \
          --type appstore \
          --readonly

    # =========================
    # Build
    # =========================
    - name: Build IPA
      if: ${{ env.MODE != 'screenshots' }}
      run: |
        mkdir -p build
        cd core_project

        if [[ "${MODE}" == "unsigned" ]]; then
          chmod +x scripts/build_unsigned_ipa.sh
          ./scripts/build_unsigned_ipa.sh "$SCHEME" "${GITHUB_WORKSPACE}/build"
        else
          fastlane gym \
            --scheme "$SCHEME" \
            --output_directory "${GITHUB_WORKSPACE}/build" \
            --export_method app-store \
            --xcargs "CURRENT_PROJECT_VERSION=${BUILD_NUMBER} MARKETING_VERSION=${APP_VERSION}"

    # =========================
    # Upload build
    # =========================
    - name: Upload build
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        IPA=$(find build -name "*.ipa" | head -1)

        asc builds upload \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --file "$IPA" \
          --version "${APP_VERSION}" \
          --build-number "${BUILD_NUMBER}"

    # =========================
    # Screenshot Upload（核心）
    # =========================
    - name: Upload screenshots
      if: ${{ env.MODE == 'screenshots' }}
      run: |
        SCREENSHOTS_DIR="core_project/screenshots"

        if [[ ! -d "$SCREENSHOTS_DIR" ]]; then
          echo "No screenshots directory found — skipping"
          exit 0
        fi

        VERSION_ID=$(asc versions list \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --output json | python3 - <<EOF
import sys, json
versions = json.load(sys.stdin)
ordered = sorted(versions, key=lambda v: 0 if v.get('appStoreState') in ('PREPARE_FOR_SUBMISSION','READY_FOR_REVIEW') else 1)
print(ordered[0]['id'] if ordered else "")
EOF
)

        echo "Version ID: $VERSION_ID"

        for locale_dir in "$SCREENSHOTS_DIR"/*/; do
          locale=$(basename "$locale_dir")

          for device_dir in "$locale_dir"*/; do
            device=$(basename "$device_dir")

            SET_ID=$(asc screenshot-sets create \
              --version-id "$VERSION_ID" \
              --locale "$locale" \
              --display-target "$device" \
              --output json 2>/dev/null | python3 - <<EOF
import sys,json
d=json.load(sys.stdin)
print(d.get("id",""))
EOF
)

            for img in $(ls "$device_dir"*.png 2>/dev/null | sort); do
              asc screenshots upload \
                --set-id "$SET_ID" \
                --file "$img"
            done
          done
        done

    # =========================
    # Artifact
    # =========================
    - name: Upload artifact
      if: ${{ env.MODE != 'screenshots' }}
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: build/*.ipa
