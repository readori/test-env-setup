name: iOS CI/CD (Production Ready)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "dev / staging / release"
        required: true
        default: "staging"

permissions:
  contents: read

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 120

    steps:

    # =========================
    # 1. Checkout CI repo
    # =========================
    - name: Checkout CI repo
      uses: actions/checkout@v4

    # =========================
    # 2. Clone PRIVATE source repo
    # =========================
    - name: Clone private app repo
      run: |
        mkdir -p workspace
        git clone git@github.com:YOUR_PRIVATE_ORG/readori.git workspace/app

    # =========================
    # 3. Install tools
    # =========================
    - name: Install tools
      run: |
        brew install fastlane
        brew tap tddworks/tap
        brew install asccli

    # =========================
    # 4. SSH key setup (private + match repo)
    # =========================
    - name: Setup SSH
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.MATCH_SSH_KEY }}
        known_hosts: github.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK3pzfEjVuG0d+XmQYsvcsXXMU3K0RTGmi5mKVp+dLAx

    # =========================
    # 5. Install certificates via MATCH (NON-INTERACTIVE)
    # =========================
    - name: Install certificates (match)
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      run: |
        cd workspace/app

        fastlane match appstore \
          --readonly \
          --git_url git@github.com:YOUR_ORG/readori-certificates.git \
          --type appstore

    # =========================
    # 6. Build IPA (AUTO SIGNING via match)
    # =========================
    - name: Build IPA
      run: |
        cd workspace/app

        fastlane gym \
          --scheme "Readori" \
          --export_method app-store \
          --output_directory build \
          --clean

    # =========================
    # 7. App Store Connect Auth
    # =========================
    - name: ASC Auth
      run: |
        mkdir -p ~/.appstoreconnect/private_keys

        echo "${{ secrets.ASC_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

        asc auth login \
          --key-id ${{ secrets.ASC_KEY_ID }} \
          --issuer-id ${{ secrets.ASC_ISSUER_ID }} \
          --p8-path ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

    # =========================
    # 8. Upload to TestFlight
    # =========================
    - name: Upload IPA
      if: ${{ github.event.inputs.environment != 'dev' }}
      run: |
        asc build upload --path workspace/app/build/*.ipa

    # =========================
    # 9. Submit to review (only release)
    # =========================
    - name: Submit review
      if: ${{ github.event.inputs.environment == 'release' }}
      run: |
        asc app submit || true

    # =========================
    # 10. Artifact backup
    # =========================
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: workspace/app/build/*.ipa
