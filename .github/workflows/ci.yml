name: Readori CI

# Unified pipeline — three modes via single dispatch:
#   unsigned   → sideload / local testing (no signing, no ASC)
#   testflight → signed IPA + upload to TestFlight
#   submit     → signed IPA + upload + submit for App Store review

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "unsigned = sideload | testflight = upload TF | submit = App Store review"
        required: false
        default: "unsigned"
        type: choice
        options:
          - unsigned
          - testflight
          - submit

      app_scheme:
        description: "xcodebuild scheme"
        required: false
        default: "Readori"
        type: string

      xcode_version:
        description: "Xcode version (optional, e.g. 16.2)"
        required: false
        default: ""
        type: string

      generate_icons:
        description: "Run icon generation script"
        required: false
        default: "yes"
        type: choice
        options:
          - "yes"
          - "no"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90

    env:
      MODE: ${{ github.event.inputs.mode }}
      SCHEME: ${{ github.event.inputs.app_scheme }}

    steps:

    # ==============================================
    # 1. SSH (dual key)
    #    app_key   → github-app   → readori/readori               (read)
    #    match_key → github-certs → readori/readori-certificates   (read, signed modes)
    # ==============================================
    - name: Install SSH keys
      run: |
        mkdir -p ~/.ssh && chmod 700 ~/.ssh

        echo "${{ secrets.PRIVATE_REPO_KEY }}" > ~/.ssh/app_key
        echo "${{ secrets.MATCH_REPO_KEY }}"   > ~/.ssh/match_key
        chmod 600 ~/.ssh/app_key ~/.ssh/match_key

        cat >> ~/.ssh/config << 'EOF'
        Host github-app
          HostName github.com
          User git
          IdentityFile ~/.ssh/app_key
          StrictHostKeyChecking no
          IdentitiesOnly yes

        Host github-certs
          HostName github.com
          User git
          IdentityFile ~/.ssh/match_key
          StrictHostKeyChecking no
          IdentitiesOnly yes
        EOF
        chmod 600 ~/.ssh/config

    # ==============================================
    # 2. CLONE PRIVATE REPO
    # ==============================================
    - name: Clone readori/readori
      run: |
        git clone --depth=1 git@github-app:readori/readori.git core_project
        echo "[clone] $(git -C core_project rev-parse --short HEAD)"

    # ==============================================
    # 3. OPTIONAL XCODE VERSION
    # ==============================================
    - name: Select Xcode
      if: ${{ github.event.inputs.xcode_version != '' }}
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ github.event.inputs.xcode_version }}

    # ==============================================
    # 4. SPM CACHE + RESOLVE
    # ==============================================
    - name: Cache Swift packages
      uses: actions/cache@v4
      with:
        path: |
          core_project/.build
          ~/Library/Caches/org.swift.swiftpm
          ~/Library/Developer/Xcode/DerivedData
        key: spm-${{ runner.os }}-${{ hashFiles('core_project/Package.resolved') }}
        restore-keys: spm-${{ runner.os }}-

    - name: Resolve Swift packages
      run: cd core_project && swift package resolve

    # ==============================================
    # 5. ICON GENERATION (optional)
    # ==============================================
    - name: Generate icons
      if: ${{ github.event.inputs.generate_icons == 'yes' }}
      run: |
        if [[ -f "core_project/scripts/generate_icons.swift" ]]; then
          swift core_project/scripts/generate_icons.swift "${GITHUB_WORKSPACE}/core_project"
        fi

    # ==============================================
    # 6. INSTALL FASTLANE (signed modes only)
    # ==============================================
    - name: Install Fastlane
      if: ${{ env.MODE != 'unsigned' }}
      run: brew install fastlane

    # ==============================================
    # 7. ASC API KEY JSON (signed modes only)
    # ==============================================
    - name: Setup ASC API key
      if: ${{ env.MODE != 'unsigned' }}
      env:
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        printf '%s' "$ASC_PRIVATE_KEY" \
          > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

        python3 - << PYEOF
        import json, os
        key_path = os.path.expanduser(
            f"~/.appstoreconnect/private_keys/AuthKey_{os.environ['ASC_KEY_ID']}.p8"
        )
        json.dump({
            "key_id":     os.environ["ASC_KEY_ID"],
            "issuer_id":  os.environ["ASC_ISSUER_ID"],
            "key":        open(key_path).read(),
            "in_house":   False
        }, open("/tmp/asc_api_key.json", "w"))
        print("ASC API key JSON ready")
        PYEOF

    # ==============================================
    # 8. MATCH — fetch signing identity (signed modes only)
    # ==============================================
    - name: Install certificates (Match readonly)
      if: ${{ env.MODE != 'unsigned' }}
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        FL_NO_UPDATE_ACTION: "true"
      run: |
        cd core_project
        fastlane match appstore \
          --git_url        git@github-certs:readori/readori-certificates.git \
          --type           appstore \
          --app_identifier com.readori.app \
          --team_id        ${{ secrets.ASC_TEAM_ID }} \
          --api_key_path   /tmp/asc_api_key.json \
          --readonly

    # ==============================================
    # 9a. BUILD — unsigned (sideload)
    # ==============================================
    - name: Build unsigned IPA
      if: ${{ env.MODE == 'unsigned' }}
      env:
        ALLOW_WRAPPED_APP: "1"
        APP_BUNDLE_IDENTIFIER: "com.readori.app"
      run: |
        mkdir -p build
        cd core_project
        chmod +x scripts/build_unsigned_ipa.sh
        ./scripts/build_unsigned_ipa.sh "$SCHEME" "${GITHUB_WORKSPACE}/build"

    # ==============================================
    # 9b. BUILD — signed (TestFlight / App Store)
    # ==============================================
    - name: Build signed IPA
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        mkdir -p build
        cd core_project
        fastlane gym \
          --scheme           "$SCHEME" \
          --output_directory "${GITHUB_WORKSPACE}/build" \
          --export_method    app-store \
          --clean

    # ==============================================
    # 10. VERSION TAG
    # ==============================================
    - name: Tag build version
      run: |
        SHORT_SHA=$(git -C core_project rev-parse --short HEAD)
        echo "BUILD_VERSION=$(date +%Y%m%d.%H%M)-${SHORT_SHA}" >> $GITHUB_ENV

    # ==============================================
    # 11. INSTALL asc-cli (TestFlight / submit only)
    # ==============================================
    - name: Install asc-cli
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        brew tap tddworks/tap
        brew install asccli

    # ==============================================
    # 12. AUTHENTICATE asc-cli
    # ==============================================
    - name: Authenticate asc-cli
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        asc auth login \
          --key-id     ${{ secrets.ASC_KEY_ID }} \
          --issuer-id  ${{ secrets.ASC_ISSUER_ID }} \
          --p8-path    ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

    # ==============================================
    # 13. UPLOAD TO TESTFLIGHT
    # ==============================================
    - name: Upload to TestFlight
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        IPA=$(find build -name "*.ipa" | head -1)
        echo "Uploading: $IPA  |  version: $BUILD_VERSION"
        asc build upload --path "$IPA"

    # ==============================================
    # 14. SUBMIT FOR REVIEW (submit only)
    # ==============================================
    - name: Submit for App Store review
      if: ${{ env.MODE == 'submit' }}
      run: asc app submit || true

    # ==============================================
    # 15. UPLOAD ARTIFACT (always)
    # ==============================================
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: readori-${{ env.BUILD_VERSION || github.run_number }}
        retention-days: 7
        if-no-files-found: warn
        path: build/*.ipa
