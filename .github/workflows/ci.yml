name: Readori CI

# Unified pipeline — four modes via single dispatch:
#   unsigned   → sideload / local testing (no signing, no ASC)
#   testflight → signed IPA + upload to TestFlight (build number auto-incremented)
#   submit     → signed IPA + upload + submit for App Store review
#   screenshots → upload App Store screenshots via asc-cli
#
# Full asc-cli automation:
#   - Auto build number increment
#   - TestFlight upload + beta notes
#   - App Store submission
#   - What's New (version localizations) update
#   - Screenshots upload per locale
#   - Subscription groups list (diagnostic)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "unsigned = sideload | testflight = upload TF | submit = App Store review | screenshots = upload screenshots"
        required: false
        default: "unsigned"
        type: choice
        options:
          - unsigned
          - testflight
          - submit
          - screenshots

      app_scheme:
        description: "xcodebuild scheme"
        required: false
        default: "Readori"
        type: string

      xcode_version:
        description: "Xcode version (optional, e.g. 16.2)"
        required: false
        default: ""
        type: string

      generate_icons:
        description: "Run icon generation script"
        required: false
        default: "yes"
        type: choice
        options:
          - "yes"
          - "no"

      app_version:
        description: "Marketing version string (e.g. 1.2.0) — required for testflight/submit"
        required: false
        default: "1.0.0"
        type: string

      whats_new_en:
        description: "What's New text (English) — for testflight/submit"
        required: false
        default: ""
        type: string

      whats_new_zh_hans:
        description: "What's New text (Simplified Chinese) — for testflight/submit"
        required: false
        default: ""
        type: string

      whats_new_zh_hant:
        description: "What's New text (Traditional Chinese) — for testflight/submit"
        required: false
        default: ""
        type: string

      beta_notes:
        description: "TestFlight beta test notes (English)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90

    env:
      MODE: ${{ github.event.inputs.mode }}
      SCHEME: ${{ github.event.inputs.app_scheme }}
      APP_VERSION: ${{ github.event.inputs.app_version }}

    steps:

    # ==============================================
    # 1. SSH (dual key)
    #    app_key   → github-app   → readori/readori               (read)
    #    match_key → github-certs → readori/readori-certificates   (read, signed modes)
    # ==============================================
    - name: Install SSH keys
      run: |
        mkdir -p ~/.ssh && chmod 700 ~/.ssh

        ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

        echo "${{ secrets.PRIVATE_REPO_KEY }}" > ~/.ssh/app_key
        echo "${{ secrets.MATCH_REPO_KEY }}"   > ~/.ssh/match_key
        chmod 600 ~/.ssh/app_key ~/.ssh/match_key

        cat >> ~/.ssh/config << 'EOF'
        Host github-app
          HostName github.com
          User git
          IdentityFile ~/.ssh/app_key
          IdentitiesOnly yes

        Host github-certs
          HostName github.com
          User git
          IdentityFile ~/.ssh/match_key
          IdentitiesOnly yes
        EOF
        chmod 600 ~/.ssh/config

    # ==============================================
    # 2. CLONE PRIVATE REPO
    # ==============================================
    - name: Clone readori/readori
      run: |
        git clone --depth=1 git@github-app:readori/readori.git core_project
        echo "[clone] $(git -C core_project rev-parse --short HEAD)"

    # ==============================================
    # 3. OPTIONAL XCODE VERSION
    # ==============================================
    - name: Select Xcode
      if: ${{ github.event.inputs.xcode_version != '' }}
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ github.event.inputs.xcode_version }}

    # ==============================================
    # 4. SPM CACHE + RESOLVE (skip for screenshots-only mode)
    # ==============================================
    - name: Cache Swift packages
      if: ${{ env.MODE != 'screenshots' }}
      uses: actions/cache@v4
      with:
        path: |
          core_project/.build
          ~/Library/Caches/org.swift.swiftpm
          ~/Library/Developer/Xcode/DerivedData
        key: spm-${{ runner.os }}-${{ hashFiles('core_project/Package.resolved') }}
        restore-keys: spm-${{ runner.os }}-

    - name: Resolve Swift packages
      if: ${{ env.MODE != 'screenshots' }}
      run: cd core_project && swift package resolve

    # ==============================================
    # 5. ICON GENERATION (optional, skip for screenshots)
    # ==============================================
    - name: Generate icons
      if: ${{ github.event.inputs.generate_icons == 'yes' && env.MODE != 'screenshots' }}
      run: |
        if [[ -f "core_project/scripts/generate_icons.swift" ]]; then
          swift core_project/scripts/generate_icons.swift "${GITHUB_WORKSPACE}/core_project"
        fi

    # ==============================================
    # 6. INSTALL FASTLANE + asc-cli (signed + screenshots modes)
    # ==============================================
    - name: Install tools (Fastlane + asc-cli)
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        brew install fastlane
        brew tap tddworks/tap
        brew install asccli

    # ==============================================
    # 7. ASC API KEY JSON (signed + screenshots modes)
    #    ASC_PRIVATE_KEY stored as raw PEM in secret
    # ==============================================
    - name: Setup ASC API key
      if: ${{ env.MODE != 'unsigned' }}
      env:
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        printf '%s' "$ASC_PRIVATE_KEY" \
          > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

        python3 - << PYEOF
        import json, os
        key_path = os.path.expanduser(
            f"~/.appstoreconnect/private_keys/AuthKey_{os.environ['ASC_KEY_ID']}.p8"
        )
        json.dump({
            "key_id":    os.environ["ASC_KEY_ID"],
            "issuer_id": os.environ["ASC_ISSUER_ID"],
            "key":       open(key_path).read(),
            "in_house":  False
        }, open("/tmp/asc_api_key.json", "w"))
        print("ASC API key JSON ready")
        PYEOF

    # ==============================================
    # 8. AUTHENTICATE asc-cli
    # ==============================================
    - name: Authenticate asc-cli
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        asc auth login \
          --key-id           ${{ secrets.ASC_KEY_ID }} \
          --issuer-id        ${{ secrets.ASC_ISSUER_ID }} \
          --private-key-path ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

    # ==============================================
    # 9. AUTO BUILD NUMBER (testflight / submit only)
    #    Fetches latest TestFlight build number and increments by 1
    # ==============================================
    - name: Auto-increment build number
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        LATEST=$(asc builds list \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --output json 2>/dev/null | \
          python3 -c "
        import sys, json
        try:
            builds = json.load(sys.stdin)
            nums = [int(b.get('version','0')) for b in builds if b.get('version','').isdigit()]
            print(max(nums) + 1 if nums else 1)
        except:
            print(1)
        " || echo "1")
        echo "BUILD_NUMBER=$LATEST" >> $GITHUB_ENV
        echo "Build number will be: $LATEST"

    # ==============================================
    # 10. MATCH — fetch signing identity (testflight / submit only)
    # ==============================================
    - name: Install certificates (Match readonly)
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        FL_NO_UPDATE_ACTION: "true"
      run: |
        cd core_project
        fastlane match appstore \
          --git_url        git@github-certs:readori/readori-certificates.git \
          --type           appstore \
          --app_identifier com.readori.app \
          --team_id        ${{ secrets.ASC_TEAM_ID }} \
          --api_key_path   /tmp/asc_api_key.json \
          --readonly

    # ==============================================
    # 11a. BUILD — unsigned (sideload)
    # ==============================================
    - name: Build unsigned IPA
      if: ${{ env.MODE == 'unsigned' }}
      env:
        ALLOW_WRAPPED_APP: "1"
        APP_BUNDLE_IDENTIFIER: "com.readori.app"
      run: |
        mkdir -p build
        cd core_project
        chmod +x scripts/build_unsigned_ipa.sh
        ./scripts/build_unsigned_ipa.sh "$SCHEME" "${GITHUB_WORKSPACE}/build"

    # ==============================================
    # 11b. BUILD — signed (TestFlight / App Store)
    #      Gym uses Match-installed signing identity
    # ==============================================
    - name: Build signed IPA
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      run: |
        mkdir -p build
        cd core_project
        fastlane gym \
          --scheme                "$SCHEME" \
          --output_directory      "${GITHUB_WORKSPACE}/build" \
          --export_method         app-store \
          --xcargs                "CURRENT_PROJECT_VERSION=${{ env.BUILD_NUMBER }} MARKETING_VERSION=${{ env.APP_VERSION }}" \
          --skip_package_validation \
          --clean

    # ==============================================
    # 12. VERSION TAG
    # ==============================================
    - name: Tag build version
      if: ${{ env.MODE != 'screenshots' }}
      run: |
        SHORT_SHA=$(git -C core_project rev-parse --short HEAD)
        BN="${BUILD_NUMBER:-0}"
        echo "BUILD_TAG=${APP_VERSION:-1.0.0}($BN)-${SHORT_SHA}" >> $GITHUB_ENV

    # ==============================================
    # 13. UPLOAD TO TESTFLIGHT
    # ==============================================
    - name: Upload to TestFlight
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        IPA=$(find build -name "*.ipa" | head -1)
        echo "Uploading: $IPA  |  tag: $BUILD_TAG"
        asc builds upload \
          --app-id       ${{ secrets.ASC_APP_ID }} \
          --file         "$IPA" \
          --version      "${{ env.APP_VERSION }}" \
          --build-number "${{ env.BUILD_NUMBER }}"

    # ==============================================
    # 14. BETA NOTES — update TestFlight test notes
    #     Runs after upload so the build is known to ASC
    # ==============================================
    - name: Update TestFlight beta notes
      if: ${{ (env.MODE == 'testflight' || env.MODE == 'submit') && github.event.inputs.beta_notes != '' }}
      env:
        BETA_NOTES: ${{ github.event.inputs.beta_notes }}
      run: |
        # Wait briefly for ASC to index the new build
        sleep 30
        BUILD_ID=$(asc builds list \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --output json 2>/dev/null | \
          python3 -c "
        import sys, json
        builds = json.load(sys.stdin)
        target = '${{ env.BUILD_NUMBER }}'
        match = next((b for b in builds if b.get('version') == target), None)
        print(match['id'] if match else '')
        " || echo "")
        if [[ -n "$BUILD_ID" ]]; then
          asc builds update-beta-notes \
            --build-id   "$BUILD_ID" \
            --whats-new  "$BETA_NOTES"
          echo "Beta notes updated for build $BUILD_ID"
        else
          echo "Warning: could not find build ${{ env.BUILD_NUMBER }} in ASC — skipping beta notes"
        fi

    # ==============================================
    # 15. WHAT'S NEW — update version localizations
    #     Runs after build is indexed in ASC
    # ==============================================
    - name: Update What's New (version localizations)
      if: ${{ env.MODE == 'submit' && (github.event.inputs.whats_new_en != '' || github.event.inputs.whats_new_zh_hans != '') }}
      run: |
        # Fetch the version currently in PREPARE_FOR_SUBMISSION or READY_FOR_REVIEW
        VERSION_ID=$(asc versions list \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --output json | \
          python3 -c "
        import sys, json
        versions = json.load(sys.stdin)
        ordered = sorted(versions, key=lambda v: (
            0 if v.get('appStoreState') in ('PREPARE_FOR_SUBMISSION','READY_FOR_REVIEW') else 1
        ))
        print(ordered[0]['id'] if ordered else '')
        ")

        if [[ -z "$VERSION_ID" ]]; then
          echo "Warning: no version found in PREPARE_FOR_SUBMISSION — skipping What's New"
          exit 0
        fi

        # Fetch all version localizations and update in one step
        export LOCALIZATIONS=$(asc version-localizations list \
          --version-id "$VERSION_ID" \
          --output json)

        # Update each locale that has input text
        python3 - << 'PYEOF'
        import subprocess, json, os, sys

        localizations = json.loads(os.environ.get('LOCALIZATIONS', '[]'))
        locale_map = {
            'en-US':   os.environ.get('INPUT_WHATS_NEW_EN', ''),
            'zh-Hans': os.environ.get('INPUT_WHATS_NEW_ZH_HANS', ''),
            'zh-Hant': os.environ.get('INPUT_WHATS_NEW_ZH_HANT', ''),
        }

        for loc in localizations:
            locale = loc.get('locale', '')
            loc_id = loc.get('id', '')
            text = locale_map.get(locale, '')
            if text and loc_id:
                result = subprocess.run(
                    ['asc', 'version-localizations', 'update',
                     '--localization-id', loc_id,
                     '--whats-new', text],
                    capture_output=True, text=True
                )
                if result.returncode == 0:
                    print(f"  ✓ {locale} What's New updated")
                else:
                    print(f"  ✗ {locale} failed: {result.stderr.strip()}", file=sys.stderr)
        PYEOF
      env:
        INPUT_WHATS_NEW_EN: ${{ github.event.inputs.whats_new_en }}
        INPUT_WHATS_NEW_ZH_HANS: ${{ github.event.inputs.whats_new_zh_hans }}
        INPUT_WHATS_NEW_ZH_HANT: ${{ github.event.inputs.whats_new_zh_hant }}

    # ==============================================
    # 16. SUBMIT FOR REVIEW (submit only)
    # ==============================================
    - name: Submit for App Store review
      if: ${{ env.MODE == 'submit' }}
      run: |
        VERSION_ID=$(asc versions list \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --output json | \
          python3 -c "
        import sys, json
        versions = json.load(sys.stdin)
        ordered = sorted(versions, key=lambda v: (
            0 if v.get('appStoreState') == 'READY_FOR_REVIEW' else 1
        ))
        print(ordered[0]['id'])
        ")
        echo "Submitting version-id: $VERSION_ID"
        asc versions submit --version-id "$VERSION_ID"

    # ==============================================
    # 17. SCREENSHOTS UPLOAD (screenshots mode)
    #     Expects screenshots pre-staged in core_project/screenshots/
    #     Structure: screenshots/<locale>/<device>/<filename>.png
    #     e.g. screenshots/en-US/iPhone_6.5/01_home.png
    # ==============================================
    - name: Upload App Store screenshots
      if: ${{ env.MODE == 'screenshots' }}
      run: |
        SCREENSHOTS_DIR="core_project/screenshots"
        if [[ ! -d "$SCREENSHOTS_DIR" ]]; then
          echo "No screenshots directory found at $SCREENSHOTS_DIR — skipping"
          exit 0
        fi

        # Get screenshot sets for the app version
        VERSION_ID=$(asc versions list \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --output json | \
          python3 -c "
        import sys, json
        versions = json.load(sys.stdin)
        ordered = sorted(versions, key=lambda v: (
            0 if v.get('appStoreState') in ('PREPARE_FOR_SUBMISSION','READY_FOR_REVIEW') else 1
        ))
        print(ordered[0]['id'] if ordered else '')
        ")

        if [[ -z "$VERSION_ID" ]]; then
          echo "No editable version found — cannot upload screenshots"
          exit 1
        fi

        echo "Target version-id: $VERSION_ID"

        # Iterate locales (directory names = locale codes)
        for locale_dir in "$SCREENSHOTS_DIR"/*/; do
          locale=$(basename "$locale_dir")
          echo "Processing locale: $locale"

          # Find or create screenshot set for this locale + display type
          for device_dir in "$locale_dir"*/; do
            device=$(basename "$device_dir")
            echo "  Device: $device"

            # Create screenshot set
            SET_ID=$(asc screenshot-sets create \
              --version-id     "$VERSION_ID" \
              --locale         "$locale" \
              --display-target "$device" \
              --output json 2>/dev/null | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" \
              || echo "")

            if [[ -z "$SET_ID" ]]; then
              # Fetch existing set
              SET_ID=$(asc screenshot-sets list \
                --version-id     "$VERSION_ID" \
                --locale         "$locale" \
                --display-target "$device" \
                --output json 2>/dev/null | \
                python3 -c "import sys,json; sets=json.load(sys.stdin); print(sets[0]['id'] if sets else '')" \
                || echo "")
            fi

            if [[ -z "$SET_ID" ]]; then
              echo "  Warning: could not get/create set for $locale/$device — skipping"
              continue
            fi

            # Upload all PNGs in sorted order
            for img in $(ls "$device_dir"*.png 2>/dev/null | sort); do
              echo "    Uploading $(basename "$img")..."
              asc screenshots upload \
                --set-id "$SET_ID" \
                --file   "$img"
            done
          done
        done
        echo "Screenshots upload complete"

    # ==============================================
    # 18. SUBSCRIPTION GROUPS — diagnostic list
    #     Runs in testflight/submit modes to confirm IAP setup
    # ==============================================
    - name: List subscription groups (diagnostic)
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      continue-on-error: true
      run: |
        echo "=== Subscription Groups ==="
        asc subscription-groups list \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --output json | \
          python3 -c "
        import sys, json
        groups = json.load(sys.stdin)
        for g in groups:
            print(f\"  {g.get('referenceName','?')}  id={g.get('id','?')}\")
        " || echo "(no subscription groups or error)"

    # ==============================================
    # 19. UPLOAD ARTIFACT (unsigned + signed modes)
    # ==============================================
    - name: Upload artifact
      if: ${{ env.MODE != 'screenshots' }}
      uses: actions/upload-artifact@v4
      with:
        name: readori-${{ env.BUILD_TAG || github.run_number }}
        retention-days: 7
        if-no-files-found: warn
        path: build/*.ipa
