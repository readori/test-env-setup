name: Readori CI

# Unified pipeline — four modes via single dispatch:
#   unsigned   → sideload / local testing (no signing, no ASC)
#   testflight → signed IPA + upload to TestFlight (build number auto-incremented)
#   submit     → signed IPA + upload + submit for App Store review
#   screenshots → upload App Store screenshots via asc-cli
#
# Full asc-cli automation:
#   - Auto build number increment
#   - TestFlight upload + beta notes
#   - App Store submission
#   - What's New (version localizations) update
#   - Screenshots upload per locale
#   - Subscription groups list (diagnostic)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "unsigned = sideload | testflight = upload TF | submit = App Store review | screenshots = upload screenshots"
        required: false
        default: "unsigned"
        type: choice
        options:
          - unsigned
          - testflight
          - submit
          - screenshots

      app_scheme:
        description: "xcodebuild scheme"
        required: false
        default: "Readori"
        type: string

      xcode_version:
        description: "Xcode version (optional, e.g. 16.2)"
        required: false
        default: ""
        type: string

      generate_icons:
        description: "Run icon generation script"
        required: false
        default: "yes"
        type: choice
        options:
          - "yes"
          - "no"

      app_version:
        description: "Marketing version string (e.g. 1.2.0) — required for testflight/submit"
        required: false
        default: "1.0.0"
        type: string

      whats_new_en:
        description: "What's New text (English) — for testflight/submit"
        required: false
        default: ""
        type: string

      whats_new_zh_hans:
        description: "What's New text (Simplified Chinese) — for testflight/submit"
        required: false
        default: ""
        type: string

      whats_new_zh_hant:
        description: "What's New text (Traditional Chinese) — for testflight/submit"
        required: false
        default: ""
        type: string

      beta_notes:
        description: "TestFlight beta test notes (English)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90

    env:
      MODE: ${{ github.event.inputs.mode }}
      SCHEME: ${{ github.event.inputs.app_scheme }}
      APP_VERSION: ${{ github.event.inputs.app_version }}

    steps:

    # ==============================================
    # 1. SSH (dual key)
    #    app_key   → github-app   → readori/readori               (read)
    #    match_key → github-certs → readori/readori-certificates   (read, signed modes)
    # ==============================================
    - name: Install SSH keys
      run: |
        mkdir -p ~/.ssh && chmod 700 ~/.ssh

        ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

        echo "${{ secrets.PRIVATE_REPO_KEY }}" > ~/.ssh/app_key
        echo "${{ secrets.MATCH_REPO_KEY }}"   > ~/.ssh/match_key
        chmod 600 ~/.ssh/app_key ~/.ssh/match_key

        cat >> ~/.ssh/config << 'EOF'
        Host github-app
          HostName github.com
          User git
          IdentityFile ~/.ssh/app_key
          IdentitiesOnly yes

        Host github-certs
          HostName github.com
          User git
          IdentityFile ~/.ssh/match_key
          IdentitiesOnly yes
        EOF
        chmod 600 ~/.ssh/config

    # ==============================================
    # 2. CLONE PRIVATE REPO
    # ==============================================
    - name: Clone readori/readori
      run: |
        git clone --depth=1 git@github-app:readori/readori.git core_project
        echo "[clone] $(git -C core_project rev-parse --short HEAD)"

    # ==============================================
    # 3. SELECT XCODE VERSION
    # ==============================================
    - name: Select Xcode (16+ required for App Store)
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ github.event.inputs.xcode_version || 'latest-stable' }}

    # ==============================================
    # 4. SPM CACHE + RESOLVE (skip for screenshots-only mode)
    # ==============================================
    - name: Cache Swift packages
      if: ${{ env.MODE != 'screenshots' }}
      uses: actions/cache@v4
      with:
        path: |
          core_project/.build
          ~/Library/Caches/org.swift.swiftpm
          ~/Library/Developer/Xcode/DerivedData
        key: spm-${{ runner.os }}-${{ hashFiles('core_project/Package.resolved') }}
        restore-keys: spm-${{ runner.os }}-

    - name: Resolve Swift packages
      if: ${{ env.MODE != 'screenshots' }}
      run: cd core_project && swift package resolve

    # ==============================================
    # 5. ICON GENERATION (optional, skip for screenshots)
    # ==============================================
    - name: Generate icons
      if: ${{ github.event.inputs.generate_icons == 'yes' && env.MODE != 'screenshots' }}
      run: |
        if [[ -f "core_project/scripts/generate_icons.swift" ]]; then
          swift core_project/scripts/generate_icons.swift "${GITHUB_WORKSPACE}/core_project"
        fi

    # ==============================================
    # 6. INSTALL FASTLANE + asc-cli (signed + screenshots modes)
    # ==============================================
    - name: Install tools (Fastlane + asc-cli)
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        brew install fastlane
        brew tap tddworks/tap
        brew install asccli

    # ==============================================
    # 7. ASC API KEY JSON (signed + screenshots modes)
    #    ASC_PRIVATE_KEY stored as raw PEM in secret
    # ==============================================
    - name: Setup ASC API key
      if: ${{ env.MODE != 'unsigned' }}
      env:
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        printf '%s' "$ASC_PRIVATE_KEY" \
          > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

        python3 - << PYEOF
        import json, os
        key_path = os.path.expanduser(
            f"~/.appstoreconnect/private_keys/AuthKey_{os.environ['ASC_KEY_ID']}.p8"
        )
        json.dump({
            "key_id":    os.environ["ASC_KEY_ID"],
            "issuer_id": os.environ["ASC_ISSUER_ID"],
            "key":       open(key_path).read(),
            "in_house":  False
        }, open("/tmp/asc_api_key.json", "w"))
        print("ASC API key JSON ready")
        PYEOF

    # ==============================================
    # 8. AUTHENTICATE asc-cli
    # ==============================================
    - name: Authenticate asc-cli
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        asc auth login \
          --key-id           ${{ secrets.ASC_KEY_ID }} \
          --issuer-id        ${{ secrets.ASC_ISSUER_ID }} \
          --private-key-path ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

    # ==============================================
    # 9. AUTO BUILD NUMBER (testflight / submit only)
    #    Fetches latest TestFlight build number and increments by 1
    #    Falls back to github.run_number (always unique + incrementing)
    # ==============================================
    - name: Auto-increment build number
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        LATEST=$(asc builds list \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --output json 2>/dev/null | \
          python3 -c "
        import sys, json
        try:
            data = json.load(sys.stdin)
            builds = data['data'] if isinstance(data, dict) and 'data' in data else (data if isinstance(data, list) else [])
            nums = []
            for b in builds:
                v = b.get('version','') if isinstance(b, dict) else ''
                if str(v).isdigit():
                    nums.append(int(v))
            print(max(nums) + 1 if nums else ${{ github.run_number }})
        except:
            print(${{ github.run_number }})
        " || echo "${{ github.run_number }}")
        echo "BUILD_NUMBER=$LATEST" >> $GITHUB_ENV
        echo "Build number will be: $LATEST"

    # ==============================================
    # 10. IMPORT CERTIFICATE + PROVISIONING PROFILE
    #     Strategy: try IOS_CERTIFICATE secret first.
    #     If it fails, use Fastlane cert/sigh via REST API
    #     to auto-create a distribution cert + profile.
    # ==============================================
    - name: Import signing certificate
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      env:
        IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
        IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
      run: |
        # Create a dedicated keychain
        security create-keychain -p "" build.keychain
        security list-keychains -s build.keychain login.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain

        # Decode and import the distribution certificate
        echo "$IOS_CERTIFICATE" | tr -d ' \n\r' | base64 --decode > /tmp/cert.p12
        CERT_SIZE=$(wc -c < /tmp/cert.p12 | tr -d ' ')
        echo "Certificate file size: ${CERT_SIZE} bytes"

        IMPORTED=false
        if security import /tmp/cert.p12 -k build.keychain -P "${IOS_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security 2>/dev/null; then
          IMPORTED=true
          echo "Certificate imported with provided password"
        elif security import /tmp/cert.p12 -k build.keychain -P "" -T /usr/bin/codesign -T /usr/bin/security 2>/dev/null; then
          IMPORTED=true
          echo "Certificate imported with empty password"
        fi
        rm -f /tmp/cert.p12

        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain 2>/dev/null || true

        # --- Fallback: create cert via ASC REST API directly ---
        if [[ "$IMPORTED" != "true" ]]; then
          echo "=== Cert import failed. Creating distribution cert via ASC REST API ==="

          # Disable set -e in fallback block (best-effort, should not abort script)
          set +e

          AUTH_KEY_PATH="/tmp/asc_keys/AuthKey_${ASC_KEY_ID}.p8"
          export AUTH_KEY_PATH
          mkdir -p /tmp/asc_keys
          # Write key directly from env var (don't rely on copy from step 7)
          printf '%s' "$ASC_PRIVATE_KEY" > "$AUTH_KEY_PATH"
          echo "Key file written: $(wc -c < "$AUTH_KEY_PATH") bytes"
          # Verify key format
          head -1 "$AUTH_KEY_PATH"

          # Debug: verify asc-cli can actually make API calls with the same key
          echo "--- Testing asc-cli API access ---"
          ASC_TEST=$(asc builds list --app-id "$ASC_APP_ID" --limit 1 2>&1) || true
          echo "asc-cli test result: $(echo "$ASC_TEST" | head -3)"

          # Debug: print env vars (first chars only)
          echo "ASC_KEY_ID: ${ASC_KEY_ID:0:4}..."
          echo "ASC_ISSUER_ID: ${ASC_ISSUER_ID:0:8}..."
          echo "Key file first 40 char: $(head -c 40 "$AUTH_KEY_PATH")"
          echo "Key file lines: $(wc -l < "$AUTH_KEY_PATH")"

          # Check /tmp/asc_api_key.json exists and has correct format
          echo "--- asc_api_key.json check ---"
          if [[ -f /tmp/asc_api_key.json ]]; then
            echo "asc_api_key.json exists, keys:"
            python3 -c "import json; d=json.load(open('/tmp/asc_api_key.json')); print('key_id:', d.get('key_id','MISSING')[:4]+'...'); print('issuer_id:', d.get('issuer_id','MISSING')[:8]+'...'); print('key_length:', len(d.get('key','')))" 2>&1 || true
          else
            echo "WARNING: /tmp/asc_api_key.json NOT FOUND"
          fi

          # Generate new RSA key pair for the certificate
          openssl genrsa -out /tmp/dist_key.pem 2048 2>/dev/null
          openssl req -new -key /tmp/dist_key.pem -out /tmp/dist.csr \
            -subj "/CN=iOS Distribution" 2>/dev/null
          CSR_CONTENT=$(openssl req -in /tmp/dist.csr -outform DER | base64 | tr -d '\n')

          # Create JWT — try multiple approaches
          # Approach 1: Use Python PyJWT + cryptography (proper EC key handling)
          pip3 install PyJWT cryptography 2>/dev/null || true
          cat > /tmp/gen_jwt.py << 'JWTPY'
        import jwt, time, json, textwrap
        from cryptography.hazmat.primitives.serialization import load_pem_private_key
        with open('/tmp/asc_api_key.json') as f:
            config = json.load(f)
        key_data = config['key']
        if '-----BEGIN' not in key_data:
            wrapped = textwrap.wrap(key_data.strip(), 64)
            key_data = '-----BEGIN PRIVATE KEY-----\n' + '\n'.join(wrapped) + '\n-----END PRIVATE KEY-----\n'
        private_key = load_pem_private_key(key_data.encode(), password=None)
        headers = {'kid': config['key_id']}
        payload = {
            'iss': config['issuer_id'],
            'iat': int(time.time()),
            'exp': int(time.time()) + 1200,
            'aud': 'appstoreconnect-v1'
        }
        print(jwt.encode(payload, private_key, algorithm='ES256', headers=headers))
        JWTPY
          JWT=$(python3 /tmp/gen_jwt.py 2>&1) || true
          echo "Python JWT result: ${#JWT} chars"
          if [[ -n "$JWT" && ${#JWT} -lt 200 ]]; then
            echo "Python JWT output (likely error): $JWT"
            JWT=""
          fi

          # Approach 2: Fallback to Ruby Spaceship if Python fails
          if [[ -z "$JWT" ]]; then
            echo "Trying Ruby Spaceship..."
            JWT=$(ruby -e '
        require "spaceship"
        token = Spaceship::ConnectAPI::Token.from_json_file("/tmp/asc_api_key.json")
        puts token.text
        ' 2>&1) || true
            echo "Spaceship JWT result: ${#JWT} chars"
            if [[ -n "$JWT" && ${#JWT} -lt 200 ]]; then
              echo "Spaceship output (likely error): $JWT"
              JWT=""
            fi
          fi

          # Approach 3: Ruby jwt gem manual as last resort
          if [[ -z "$JWT" ]]; then
            echo "Trying Ruby jwt gem..."
            JWT=$(ruby -e '
        require "jwt"
        require "openssl"
        raw = File.read(ENV["AUTH_KEY_PATH"])
        unless raw.include?("-----BEGIN")
          raw = "-----BEGIN PRIVATE KEY-----\n#{raw.strip}\n-----END PRIVATE KEY-----\n"
        end
        key = OpenSSL::PKey::EC.new(raw)
        payload = {
          iss: ENV["ASC_ISSUER_ID"],
          iat: Time.now.to_i,
          exp: Time.now.to_i + 1200,
          aud: "appstoreconnect-v1"
        }
        puts JWT.encode(payload, key, "ES256", { kid: ENV["ASC_KEY_ID"] })
        ' 2>&1) || true
            echo "Ruby JWT result: ${#JWT} chars"
            if [[ -n "$JWT" && ${#JWT} -lt 200 ]]; then
              echo "Ruby JWT output (likely error): $JWT"
              JWT=""
            fi
          fi

          echo "JWT created (${#JWT} chars)"

          # Verify JWT against a known endpoint first
          echo "--- Verifying JWT against /v1/apps ---"
          TEST_CODE=$(curl -s -o /tmp/jwt_test.json -w "%{http_code}" \
            "https://api.appstoreconnect.apple.com/v1/apps?limit=1" \
            -H "Authorization: Bearer $JWT")
          echo "JWT verification: HTTP $TEST_CODE"
          if [[ "$TEST_CODE" != "200" ]]; then
            echo "JWT test response:"
            cat /tmp/jwt_test.json | head -5
          fi

          echo "JWT created (${#JWT} chars)"

          # === STEP A: Revoke ALL existing iOS Distribution certs first ===
          echo "--- Revoking all existing iOS Distribution certs ---"
          EXISTING=$(curl -s \
            "https://api.appstoreconnect.apple.com/v1/certificates?filter%5BcertificateType%5D=IOS_DISTRIBUTION" \
            -H "Authorization: Bearer $JWT")
          CERT_IDS_TO_REVOKE=$(echo "$EXISTING" | ruby -e '
        require "json"
        data = JSON.parse(STDIN.read)
        certs = data["data"] || []
        STDERR.puts "Found #{certs.length} existing iOS Distribution certs"
        certs.each { |c| puts c["id"] }
        ')
          while IFS= read -r CID; do
            [[ -z "$CID" ]] && continue
            echo "Revoking cert: $CID"
            curl -s -X DELETE \
              "https://api.appstoreconnect.apple.com/v1/certificates/${CID}" \
              -H "Authorization: Bearer $JWT" || true
          done <<< "$CERT_IDS_TO_REVOKE"
          sleep 2

          # === STEP B: Create new iOS Distribution certificate ===
          echo "--- Creating iOS Distribution certificate ---"
          CERT_RESPONSE=$(curl -s -X POST \
            "https://api.appstoreconnect.apple.com/v1/certificates" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"data\":{\"type\":\"certificates\",\"attributes\":{\"csrContent\":\"${CSR_CONTENT}\",\"certificateType\":\"IOS_DISTRIBUTION\"}}}")

          # Extract cert ID and content
          eval $(echo "$CERT_RESPONSE" | ruby -e '
        require "json"
        data = JSON.parse(STDIN.read)
        cert_id = data.dig("data", "id")
        content = data.dig("data", "attributes", "certificateContent")
        if cert_id && content
          puts "CERT_ID=#{cert_id}"
          puts "CERT_CONTENT=#{content}"
        else
          err = data.dig("errors", 0, "detail") || "unknown"
          STDERR.puts "API error: #{err}"
          puts "CERT_ID="
          puts "CERT_CONTENT="
        end
        ')
          if [[ -n "$CERT_CONTENT" ]]; then
            echo "Certificate created: $CERT_ID"
            echo "$CERT_CONTENT" | base64 --decode > /tmp/dist.cer
            echo "Cert file size: $(wc -c < /tmp/dist.cer) bytes"
            echo "Private key file size: $(wc -c < /tmp/dist_key.pem) bytes"

            # Verify cert is valid
            openssl x509 -in /tmp/dist.cer -inform DER -noout -subject -dates 2>&1 || \
              openssl x509 -in /tmp/dist.cer -inform PEM -noout -subject -dates 2>&1 || \
              echo "WARNING: Could not parse cert"

            # Create p12 from private key + cert
            # Use -legacy flag for macOS Security framework compatibility (OpenSSL 3.x)
            if ! openssl pkcs12 -export -out /tmp/dist.p12 \
              -inkey /tmp/dist_key.pem -in /tmp/dist.cer -inform DER \
              -passout pass: -legacy 2>/dev/null; then
              echo "DER+legacy failed, trying PEM+legacy..."
              openssl x509 -in /tmp/dist.cer -inform DER -out /tmp/dist_pem.cer -outform PEM 2>/dev/null || \
                cp /tmp/dist.cer /tmp/dist_pem.cer
              if ! openssl pkcs12 -export -out /tmp/dist.p12 \
                -inkey /tmp/dist_key.pem -in /tmp/dist_pem.cer \
                -passout pass: -legacy 2>&1; then
                echo "Legacy failed, trying without -legacy..."
                openssl pkcs12 -export -out /tmp/dist.p12 \
                  -inkey /tmp/dist_key.pem -in /tmp/dist_pem.cer \
                  -passout pass: 2>&1 || echo "WARNING: p12 creation failed"
              fi
            fi
            echo "P12 file size: $(wc -c < /tmp/dist.p12 2>/dev/null || echo 0) bytes"

            # Import into keychain
            if security import /tmp/dist.p12 -k build.keychain -P "" \
              -T /usr/bin/codesign -T /usr/bin/security 2>&1; then
              echo "P12 imported to keychain successfully"
            else
              echo "WARNING: P12 import to keychain failed"
              # Try importing cert and key separately
              echo "Trying separate import (cert then key)..."
              security import /tmp/dist.cer -k build.keychain \
                -T /usr/bin/codesign -T /usr/bin/security 2>&1 || true
              security import /tmp/dist_key.pem -k build.keychain \
                -T /usr/bin/codesign -T /usr/bin/security 2>&1 || true
            fi
            security set-key-partition-list -S apple-tool:,apple:,codesign: \
              -s -k "" build.keychain 2>/dev/null || true
            
            # Immediately verify
            echo "=== Identities right after import ==="
            security find-identity -v -p codesigning build.keychain
            security find-identity -v -p codesigning  # Also check default search list

            IMPORTED=true
            echo "Distribution certificate imported to keychain!"

            # Now create a matching provisioning profile via REST API
            echo "--- Creating App Store provisioning profile ---"
            # First, look up the bundle ID resource
            BUNDLE_RESPONSE=$(curl -s \
              "https://api.appstoreconnect.apple.com/v1/bundleIds?filter%5Bidentifier%5D=com.readori.app" \
              -H "Authorization: Bearer $JWT")
            BUNDLE_RES_ID=$(echo "$BUNDLE_RESPONSE" | ruby -e '
        require "json"
        data = JSON.parse(STDIN.read)
        bid = data["data"]&.first
        if bid
          puts bid["id"]
        else
          STDERR.puts "Bundle ID not found: #{data.to_json[0..200]}"
        end
        ')

            if [[ -n "$BUNDLE_RES_ID" ]]; then
              echo "Bundle ID resource: $BUNDLE_RES_ID"
              # Create App Store provisioning profile
              PROFILE_RESPONSE=$(curl -s -X POST \
                "https://api.appstoreconnect.apple.com/v1/profiles" \
                -H "Authorization: Bearer $JWT" \
                -H "Content-Type: application/json" \
                -d "{\"data\":{\"type\":\"profiles\",\"attributes\":{\"name\":\"Readori CI AppStore $(date +%Y%m%d%H%M)\",\"profileType\":\"IOS_APP_STORE\"},\"relationships\":{\"bundleId\":{\"data\":{\"type\":\"bundleIds\",\"id\":\"${BUNDLE_RES_ID}\"}},\"certificates\":{\"data\":[{\"type\":\"certificates\",\"id\":\"${CERT_ID}\"}]}}}}")

              eval $(echo "$PROFILE_RESPONSE" | ruby -e '
        require "json"
        data = JSON.parse(STDIN.read)
        content = data.dig("data", "attributes", "profileContent")
        uuid = data.dig("data", "attributes", "uuid")
        if content && uuid
          puts "PROF_CONTENT=#{content}"
          puts "PROF_UUID=#{uuid}"
          STDERR.puts "Profile created: #{uuid}"
        else
          STDERR.puts "Profile creation error: #{data.dig("errors", 0, "detail") || data.to_json[0..300]}"
          puts "PROF_CONTENT="
          puts "PROF_UUID="
        end
        ')

              if [[ -n "$PROF_CONTENT" && -n "$PROF_UUID" ]]; then
                mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
                echo "$PROF_CONTENT" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/${PROF_UUID}.mobileprovision
                echo "Provisioning profile installed: $PROF_UUID"
                echo "PROFILE_UUID=${PROF_UUID}" >> $GITHUB_ENV
              else
                echo "Profile creation failed — falling back to secret profile"
              fi
            fi
          else
            echo "Failed to create certificate via REST API"
          fi

          # Clean up sensitive files
          rm -f /tmp/dist_key.pem /tmp/dist.csr /tmp/dist.cer /tmp/dist.p12

          # Final fallback: install provisioning profile from secret if not set
          if [[ -z "${PROF_UUID:-}" ]]; then
            if [[ -n "$IOS_PROVISIONING_PROFILE" ]]; then
              echo "Installing provisioning profile from secret..."
              mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
              echo "$IOS_PROVISIONING_PROFILE" | tr -d ' \n\r' | base64 --decode > /tmp/profile.mobileprovision
              PROFILE_UUID=""
              if security cms -D -i /tmp/profile.mobileprovision > /tmp/profile_plist.xml 2>/dev/null; then
                PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile_plist.xml 2>/dev/null || true)
              fi
              rm -f /tmp/profile_plist.xml
              if [[ -n "$PROFILE_UUID" ]]; then
                cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
                echo "Secret profile installed: ${PROFILE_UUID}"
                echo "PROFILE_UUID=${PROFILE_UUID}" >> $GITHUB_ENV
              fi
              rm -f /tmp/profile.mobileprovision
            fi
          fi

          # Check signing identities
          echo "=== Signing identities after REST API cert creation ==="
          security find-identity -v -p codesigning build.keychain
          CERT_COUNT=$(security find-identity -v -p codesigning build.keychain | grep -c '^[[:space:]]*[0-9]*)' || echo "0")
          echo "Found $CERT_COUNT signing identities"
        else
          # Cert import succeeded — install provisioning profile from secret
          if [[ -n "$IOS_PROVISIONING_PROFILE" ]]; then
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            echo "$IOS_PROVISIONING_PROFILE" | tr -d ' \n\r' | base64 --decode > /tmp/profile.mobileprovision
            PROF_SIZE=$(wc -c < /tmp/profile.mobileprovision | tr -d ' ')
            echo "Provisioning profile size: ${PROF_SIZE} bytes"
            PROFILE_UUID=""
            if security cms -D -i /tmp/profile.mobileprovision > /tmp/profile_plist.xml 2>/dev/null; then
              PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile_plist.xml 2>/dev/null || true)
            fi
            rm -f /tmp/profile_plist.xml
            if [[ -n "$PROFILE_UUID" ]]; then
              cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
              echo "Provisioning profile installed: ${PROFILE_UUID}"
              echo "PROFILE_UUID=${PROFILE_UUID}" >> $GITHUB_ENV
            fi
            rm -f /tmp/profile.mobileprovision
          fi
        fi

        # Re-enable error checking
        set -e

        echo "CERT_IMPORTED=${IMPORTED}" >> $GITHUB_ENV

        echo "=== Final signing identities ==="
        security find-identity -v -p codesigning build.keychain | head -5

        # Ensure ASC key for xcodebuild
        mkdir -p /tmp/asc_keys
        if [[ ! -f "/tmp/asc_keys/AuthKey_${ASC_KEY_ID}.p8" ]]; then
          printf '%s' "$ASC_PRIVATE_KEY" > "/tmp/asc_keys/AuthKey_${ASC_KEY_ID}.p8"
        fi

    # ==============================================
    # 11a. BUILD — unsigned (sideload)
    # ==============================================
    - name: Build unsigned IPA
      if: ${{ env.MODE == 'unsigned' }}
      env:
        ALLOW_WRAPPED_APP: "1"
        APP_BUNDLE_IDENTIFIER: "com.readori.app"
      run: |
        mkdir -p build
        cd core_project
        chmod +x scripts/build_unsigned_ipa.sh
        ./scripts/build_unsigned_ipa.sh "$SCHEME" "${GITHUB_WORKSPACE}/build"

    # ==============================================
    # 11b. BUILD — signed IPA for App Store
    #      SPM executableTarget does NOT produce a real .app via archive.
    #      Strategy: build unsigned → wrap executable → codesign → package IPA
    # ==============================================
    - name: Build signed IPA (SPM manual sign)
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      env:
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        ASC_TEAM_ID: ${{ secrets.ASC_TEAM_ID }}
      run: |
        set -euo pipefail
        REPO_ROOT="$GITHUB_WORKSPACE/core_project"
        BUILD_ROOT="$GITHUB_WORKSPACE/build"
        DERIVED_DATA="$BUILD_ROOT/DerivedData"
        EXPORT_DIR="$BUILD_ROOT/export"
        INFO_PLIST="$REPO_ROOT/Readori/Supporting/Info.plist"
        ENTITLEMENTS="$REPO_ROOT/Readori/Supporting/Readori.entitlements"
        LAUNCH_STORYBOARD="$REPO_ROOT/Readori/Supporting/LaunchScreen.storyboard"
        ICONSET_DIR="$REPO_ROOT/Readori/Resources/Assets.xcassets/AppIcon.appiconset"
        AUTH_KEY="/tmp/asc_keys/AuthKey_${ASC_KEY_ID}.p8"

        mkdir -p "$EXPORT_DIR"
        rm -rf "$DERIVED_DATA"

        # ── Pre-build: Strip alpha from AppIcon PNGs (Apple requires no transparency) ──
        if [[ -d "$ICONSET_DIR" ]]; then
          echo "Stripping alpha from AppIcon PNGs..."
          # Generate icon-1024.png if missing (required for App Store marketing icon)
          if [[ ! -f "$ICONSET_DIR/icon-1024.png" ]]; then
            echo "icon-1024.png missing, generating from largest available icon..."
            # Run generate_icons.swift if available
            if [[ -f "$REPO_ROOT/scripts/generate_icons.swift" ]]; then
              swift "$REPO_ROOT/scripts/generate_icons.swift" "$REPO_ROOT" 2>&1 || true
            fi
            # Fallback: scale up from icon-180.png if still missing
            if [[ ! -f "$ICONSET_DIR/icon-1024.png" ]]; then
              LARGEST=$(ls -S "$ICONSET_DIR"/*.png 2>/dev/null | head -1)
              if [[ -n "$LARGEST" ]]; then
                sips -z 1024 1024 "$LARGEST" --out "$ICONSET_DIR/icon-1024.png" 2>/dev/null || true
                echo "Generated icon-1024.png from $LARGEST"
              fi
            fi
          fi
          for png in "$ICONSET_DIR"/*.png; do
            [[ -f "$png" ]] && sips -s format png -s formatOptions 100 --setProperty hasAlpha false "$png" --out "$png" 2>/dev/null || true
          done
          echo "Alpha stripped from all AppIcon PNGs"
        fi

        # ── Step 1: Build unsigned (with INFOPLIST_FILE for proper bundle) ──
        echo "=== Step 1: Build unsigned ==="
        cd "$REPO_ROOT"
        xcodebuild build \
          -scheme "$SCHEME" \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -derivedDataPath "$DERIVED_DATA" \
          -skipPackagePluginValidation \
          -skipMacroValidation \
          -onlyUsePackageVersionsFromResolvedFile \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          TARGETED_DEVICE_FAMILY=1 \
          GENERATE_INFOPLIST_FILE=NO \
          INFOPLIST_FILE="$INFO_PLIST" \
          INFOPLIST_KEY_UILaunchStoryboardName=LaunchScreen \
          CURRENT_PROJECT_VERSION="${{ env.BUILD_NUMBER }}" \
          MARKETING_VERSION="${{ env.APP_VERSION }}" \
          ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon \
          ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS=YES \
          ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
          COMPILER_INDEX_STORE_ENABLE=NO \
          ENABLE_TESTABILITY=NO \
          2>&1 | tee /tmp/build.log

        echo "** BUILD SUCCEEDED **"

        # ── Step 2: Find or wrap .app bundle ──
        echo "=== Step 2: Locate .app bundle ==="
        PRODUCT_DIR="$DERIVED_DATA/Build/Products/Release-iphoneos"
        APP_PATH=""

        # Try standard product directory first
        if [[ -d "$PRODUCT_DIR/${SCHEME}.app" ]]; then
          APP_PATH="$PRODUCT_DIR/${SCHEME}.app"
        else
          # Search DerivedData for .app
          APP_PATH=$(find "$DERIVED_DATA" -type d -name '*.app' \
            ! -path '*/Index.noindex/*' ! -path '*/SourcePackages/*' \
            | while read -r app; do
                if [[ -f "$app/$SCHEME" ]]; then echo "$app"; break; fi
              done) || true
        fi

        if [[ -z "$APP_PATH" || ! -d "$APP_PATH" ]]; then
          echo "No .app bundle found. Wrapping bare executable into .app..."
          APP_BINARY="$PRODUCT_DIR/$SCHEME"
          if [[ ! -f "$APP_BINARY" ]]; then
            APP_BINARY=$(find "$PRODUCT_DIR" -name "$SCHEME" -type f | head -1)
          fi
          if [[ ! -f "$APP_BINARY" ]]; then
            echo "ERROR: No executable found in $PRODUCT_DIR"
            ls -la "$PRODUCT_DIR" || true
            exit 1
          fi

          APP_PATH="$BUILD_ROOT/${SCHEME}.app"
          rm -rf "$APP_PATH"
          mkdir -p "$APP_PATH"

          cp "$APP_BINARY" "$APP_PATH/$SCHEME"
          chmod +x "$APP_PATH/$SCHEME"
          cp "$INFO_PLIST" "$APP_PATH/Info.plist"

          # Patch Info.plist for app bundle
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable $SCHEME" "$APP_PATH/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.readori.app" "$APP_PATH/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ env.BUILD_NUMBER }}" "$APP_PATH/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ env.APP_VERSION }}" "$APP_PATH/Info.plist" || true

          # UIDeviceFamily
          /usr/libexec/PlistBuddy -c "Delete :UIDeviceFamily" "$APP_PATH/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily array" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:0 integer 1" "$APP_PATH/Info.plist"

          # UILaunchScreen dict
          /usr/libexec/PlistBuddy -c "Delete :UILaunchScreen" "$APP_PATH/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UILaunchScreen dict" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :UILaunchStoryboardName LaunchScreen" "$APP_PATH/Info.plist" || \
            /usr/libexec/PlistBuddy -c "Add :UILaunchStoryboardName string LaunchScreen" "$APP_PATH/Info.plist" || true

          # Compile LaunchScreen storyboard
          if [[ -f "$LAUNCH_STORYBOARD" ]]; then
            xcrun ibtool --compile "$APP_PATH/LaunchScreen.storyboardc" "$LAUNCH_STORYBOARD" \
              --target-device iphone --minimum-deployment-target 16.0 || true
          fi

          # Copy app icons
          if [[ -d "$ICONSET_DIR" ]]; then
            [[ -f "$ICONSET_DIR/icon-120.png" ]] && cp "$ICONSET_DIR/icon-120.png" "$APP_PATH/AppIcon60x60@2x.png"
            [[ -f "$ICONSET_DIR/icon-180.png" ]] && cp "$ICONSET_DIR/icon-180.png" "$APP_PATH/AppIcon60x60@3x.png"
          fi

          # Copy compiled Assets.car from build products (contains AppIcon + other assets)
          ASSETS_CAR=$(find "$DERIVED_DATA" -name "Assets.car" ! -path "*/SourcePackages/*" | head -1)
          if [[ -n "$ASSETS_CAR" ]]; then
            cp "$ASSETS_CAR" "$APP_PATH/Assets.car"
            echo "Copied Assets.car from: $ASSETS_CAR"
          else
            echo "No Assets.car found. Compiling asset catalog manually..."
            ASSETS_XCASSETS="$REPO_ROOT/Readori/Resources/Assets.xcassets"
            if [[ -d "$ASSETS_XCASSETS" ]]; then
              xcrun actool "$ASSETS_XCASSETS" \
                --compile "$APP_PATH" \
                --platform iphoneos \
                --minimum-deployment-target 16.0 \
                --app-icon AppIcon \
                --output-partial-info-plist /tmp/assetcatalog_partial.plist \
                2>&1 || echo "WARNING: actool failed"
            fi
          fi

          # Copy SPM resources (lproj folders, Fonts, etc.)
          for RESOURCE_DIR in "$PRODUCT_DIR"/${SCHEME}_${SCHEME}.bundle "$PRODUCT_DIR"/Readori_Readori.bundle; do
            if [[ -d "$RESOURCE_DIR" ]]; then
              echo "Copying SPM resource bundle: $RESOURCE_DIR"
              cp -R "$RESOURCE_DIR" "$APP_PATH/" || true
            fi
          done

          # Remove old_* lproj dirs (invalid locale names cause warning 90176)
          find "$APP_PATH" -type d -name 'old_*' -exec rm -rf {} + 2>/dev/null || true

          echo "Wrapped .app at: $APP_PATH"

        # Always ensure required plist fields (whether found or wrapped)
        XCODE_OUTPUT=$(xcodebuild -version 2>/dev/null || true)
        XCODE_VER=$(echo "$XCODE_OUTPUT" | head -1 | sed 's/Xcode //')
        XCODE_BUILD=$(echo "$XCODE_OUTPUT" | tail -1 | sed 's/Build version //')
        SDK_VER=$(xcrun --show-sdk-version --sdk iphoneos)
        SDK_NAME="iphoneos${SDK_VER}"

        echo "Injecting DT* fields: Xcode=$XCODE_VER Build=$XCODE_BUILD SDK=$SDK_NAME"
        PB="/usr/libexec/PlistBuddy"
        PLIST="$APP_PATH/Info.plist"

        # DT* build metadata (required by App Store validation)
        $PB -c "Delete :DTPlatformName" "$PLIST" 2>/dev/null || true
        $PB -c "Add :DTPlatformName string iphoneos" "$PLIST"
        $PB -c "Delete :DTPlatformVersion" "$PLIST" 2>/dev/null || true
        $PB -c "Add :DTPlatformVersion string $SDK_VER" "$PLIST"
        $PB -c "Delete :DTSDKName" "$PLIST" 2>/dev/null || true
        $PB -c "Add :DTSDKName string $SDK_NAME" "$PLIST"
        $PB -c "Delete :DTXcode" "$PLIST" 2>/dev/null || true
        $PB -c "Add :DTXcode string $(echo $XCODE_VER | tr -d '.')" "$PLIST"
        $PB -c "Delete :DTXcodeBuild" "$PLIST" 2>/dev/null || true
        $PB -c "Add :DTXcodeBuild string $XCODE_BUILD" "$PLIST"
        $PB -c "Delete :DTCompiler" "$PLIST" 2>/dev/null || true
        $PB -c "Add :DTCompiler string com.apple.compilers.llvm.clang.1_0" "$PLIST"
        $PB -c "Delete :DTPlatformBuild" "$PLIST" 2>/dev/null || true
        $PB -c "Add :DTPlatformBuild string $XCODE_BUILD" "$PLIST"
        $PB -c "Delete :BuildMachineOSBuild" "$PLIST" 2>/dev/null || true
        $PB -c "Add :BuildMachineOSBuild string $(sw_vers -buildVersion)" "$PLIST"
        $PB -c "Delete :MinimumOSVersion" "$PLIST" 2>/dev/null || true
        $PB -c "Add :MinimumOSVersion string 16.0" "$PLIST"

        # UIRequiredDeviceCapabilities (required for App Store)
        $PB -c "Delete :UIRequiredDeviceCapabilities" "$PLIST" 2>/dev/null || true
        $PB -c "Add :UIRequiredDeviceCapabilities array" "$PLIST"
        $PB -c "Add :UIRequiredDeviceCapabilities:0 string arm64" "$PLIST"

        # UIRequiresFullScreen
        $PB -c "Delete :UIRequiresFullScreen" "$PLIST" 2>/dev/null || true
        $PB -c "Add :UIRequiresFullScreen bool true" "$PLIST"

        # CFBundleSupportedPlatforms (required: single-element array)
        $PB -c "Delete :CFBundleSupportedPlatforms" "$PLIST" 2>/dev/null || true
        $PB -c "Add :CFBundleSupportedPlatforms array" "$PLIST"
        $PB -c "Add :CFBundleSupportedPlatforms:0 string iPhoneOS" "$PLIST"

        # LSSupportsOpeningDocumentsInPlace (required when CFBundleDocumentTypes exists)
        $PB -c "Delete :LSSupportsOpeningDocumentsInPlace" "$PLIST" 2>/dev/null || true
        $PB -c "Add :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST"

        fi

        echo "Using .app: $APP_PATH"
        echo "Contents:"
        ls -la "$APP_PATH/" | head -20

        # ── Step 3: Embed provisioning profile ──
        echo "=== Step 3: Embed provisioning profile ==="
        PROFILE_PATH=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" | head -1)
        if [[ -n "$PROFILE_PATH" ]]; then
          cp "$PROFILE_PATH" "$APP_PATH/embedded.mobileprovision"
          echo "Embedded: $PROFILE_PATH"
        else
          echo "WARNING: No provisioning profile found to embed"
        fi

        # ── Step 4: Code sign ──
        echo "=== Step 4: Code signing ==="

        # Find the signing identity
        SIGN_ID=$(security find-identity -v -p codesigning build.keychain | grep "iPhone Distribution" | head -1 | sed 's/.*"\(.*\)".*/\1/')
        if [[ -z "$SIGN_ID" ]]; then
          SIGN_ID=$(security find-identity -v -p codesigning build.keychain | grep "Apple Distribution" | head -1 | sed 's/.*"\(.*\)".*/\1/')
        fi
        if [[ -z "$SIGN_ID" ]]; then
          echo "ERROR: No distribution signing identity found in keychain"
          security find-identity -v -p codesigning build.keychain
          exit 1
        fi
        echo "Signing identity: $SIGN_ID"

        # Build entitlements for codesign — must include application-identifier
        # and match the provisioning profile capabilities
        SIGN_ENTITLEMENTS="/tmp/sign_entitlements.plist"
        printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict/>\n</plist>\n' > "$SIGN_ENTITLEMENTS"
        /usr/libexec/PlistBuddy -c "Add :application-identifier string ${ASC_TEAM_ID}.com.readori.app" "$SIGN_ENTITLEMENTS"
        /usr/libexec/PlistBuddy -c "Add :com.apple.developer.team-identifier string ${ASC_TEAM_ID}" "$SIGN_ENTITLEMENTS"
        /usr/libexec/PlistBuddy -c "Add :get-task-allow bool false" "$SIGN_ENTITLEMENTS"
        /usr/libexec/PlistBuddy -c "Add :keychain-access-groups array" "$SIGN_ENTITLEMENTS"
        /usr/libexec/PlistBuddy -c "Add :keychain-access-groups:0 string ${ASC_TEAM_ID}.com.readori.app" "$SIGN_ENTITLEMENTS"

        # Check if profile supports iCloud — if so, add iCloud entitlements
        if [[ -n "$PROFILE_PATH" ]]; then
          PROF_ENTS=$(security cms -D -i "$APP_PATH/embedded.mobileprovision" 2>/dev/null || true)
          if echo "$PROF_ENTS" | grep -q "icloud-services"; then
            echo "Profile supports iCloud, adding iCloud entitlements"
            /usr/libexec/PlistBuddy -c "Add :com.apple.developer.icloud-container-identifiers array" "$SIGN_ENTITLEMENTS"
            /usr/libexec/PlistBuddy -c "Add :com.apple.developer.icloud-container-identifiers:0 string iCloud.com.readori.app" "$SIGN_ENTITLEMENTS"
            /usr/libexec/PlistBuddy -c "Add :com.apple.developer.icloud-services array" "$SIGN_ENTITLEMENTS"
            /usr/libexec/PlistBuddy -c "Add :com.apple.developer.icloud-services:0 string CloudDocuments" "$SIGN_ENTITLEMENTS"
          else
            echo "Profile does NOT support iCloud, skipping iCloud entitlements"
          fi
        fi

        echo "=== Entitlements for signing ==="
        cat "$SIGN_ENTITLEMENTS"

        # Sign frameworks/dylibs first (if any)
        find "$APP_PATH" -name "*.framework" -o -name "*.dylib" | while read -r lib; do
          codesign -f -s "$SIGN_ID" --timestamp=none "$lib" 2>&1 || true
        done

        # Sign the app bundle
        codesign -f -s "$SIGN_ID" --entitlements "$SIGN_ENTITLEMENTS" --timestamp=none "$APP_PATH"
        echo "Code signing succeeded"

        # Verify
        codesign -dvv "$APP_PATH" 2>&1
        codesign --verify --strict "$APP_PATH" 2>&1 || echo "WARNING: strict verification failed"

        # ── Step 5: Package IPA ──
        echo "=== Step 5: Package IPA ==="
        PAYLOAD_DIR="$BUILD_ROOT/Payload"
        rm -rf "$PAYLOAD_DIR"
        mkdir -p "$PAYLOAD_DIR"
        cp -R "$APP_PATH" "$PAYLOAD_DIR/"

        IPA_PATH="$EXPORT_DIR/${SCHEME}.ipa"
        cd "$BUILD_ROOT"
        zip -r -q "$IPA_PATH" Payload
        echo "IPA=$IPA_PATH" >> $GITHUB_ENV
        echo "Built: $IPA_PATH ($(du -h "$IPA_PATH" | cut -f1))"

    # ==============================================
    # 12. VERSION TAG
    # ==============================================
    - name: Tag build version
      if: ${{ env.MODE != 'screenshots' }}
      run: |
        SHORT_SHA=$(git -C core_project rev-parse --short HEAD)
        BN="${BUILD_NUMBER:-0}"
        echo "BUILD_TAG=${APP_VERSION:-1.0.0}($BN)-${SHORT_SHA}" >> $GITHUB_ENV

    # ==============================================
    # 13. UPLOAD TO TESTFLIGHT
    # ==============================================
    - name: Upload to TestFlight
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      env:
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
      run: |
        IPA=$(find build -name "*.ipa" | head -1)
        echo "Uploading: $IPA  |  tag: ${BUILD_TAG:-unknown}"
        AUTH_KEY="/tmp/asc_keys/AuthKey_${ASC_KEY_ID}.p8"

        # Use xcrun altool for TestFlight upload (works with API key auth)
        xcrun altool --upload-app \
          -f "$IPA" \
          --type ios \
          --apiKey "$ASC_KEY_ID" \
          --apiIssuer "$ASC_ISSUER_ID" \
          2>&1 || {
          echo "altool failed, trying Transporter..."
          # Fallback: manual upload via App Store Connect API
          echo "Please upload $IPA manually or set ASC_APP_ID for asc-cli upload"
          exit 1
        }

    # ==============================================
    # 14. BETA NOTES — update TestFlight test notes
    #     Runs after upload so the build is known to ASC
    # ==============================================
    - name: Update TestFlight beta notes
      if: ${{ (env.MODE == 'testflight' || env.MODE == 'submit') && github.event.inputs.beta_notes != '' }}
      env:
        BETA_NOTES: ${{ github.event.inputs.beta_notes }}
      run: |
        # Wait for ASC to index the new build
        sleep 30
        BUILD_ID=$(asc builds list \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --output json 2>/dev/null | \
          python3 -c "
        import sys, json
        try:
            data = json.load(sys.stdin)
            builds = data['data'] if isinstance(data, dict) and 'data' in data else data
            target = '${BUILD_NUMBER}'
            match = next((b for b in builds if str(b.get('version','')) == target), None)
            print(match['id'] if match else '')
        except Exception as e:
            print('', file=sys.stderr)
        " || echo "")
        if [[ -n "$BUILD_ID" ]]; then
          asc builds update-beta-notes \
            --build-id "$BUILD_ID" \
            --locale   en-US \
            --notes    "$BETA_NOTES" || true
          echo "Beta notes updated for build $BUILD_ID"
        else
          echo "Warning: could not find build ${BUILD_NUMBER} in ASC — skipping beta notes"
        fi

    # ==============================================
    # 15. WHAT'S NEW — update version localizations
    #     Runs after build is indexed in ASC
    # ==============================================
    - name: Update What's New (version localizations)
      if: ${{ (env.MODE == 'testflight' || env.MODE == 'submit') && (github.event.inputs.whats_new_en != '' || github.event.inputs.whats_new_zh_hans != '') }}
      run: |
        # Fetch version in PREPARE_FOR_SUBMISSION, READY_FOR_REVIEW, or DEVELOPER_REJECTED
        VERSION_ID=$(asc versions list \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --output json 2>/dev/null | \
          python3 -c "
        import sys, json
        try:
            data = json.load(sys.stdin)
            versions = data['data'] if isinstance(data, dict) and 'data' in data else data
            ordered = sorted(versions, key=lambda v: (
        0 if v.get('appStoreState') in ('PREPARE_FOR_SUBMISSION','READY_FOR_REVIEW','DEVELOPER_REJECTED') else 1
            ))
            print(ordered[0]['id'] if ordered else '')
        except: print('')
        " || echo "")

        if [[ -z "$VERSION_ID" ]]; then
          echo "No editable version found in ASC — creating version ${{ env.APP_VERSION }}"
          VERSION_ID=$(asc versions create \
            --app-id  ${{ secrets.ASC_APP_ID }} \
            --version "${{ env.APP_VERSION }}" \
            --platform ios \
            --output json 2>/dev/null | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id', d.get('data',{}).get('id','')))" \
            || echo "")
        fi

        if [[ -z "$VERSION_ID" ]]; then
          echo "Warning: could not get/create version — skipping What's New"
          exit 0
        fi
        echo "VERSION_ID=$VERSION_ID" >> $GITHUB_ENV
        echo "Version: $VERSION_ID"

        # Fetch localizations and update What's New per locale
        python3 - << 'PYEOF'
        import subprocess, json, os, sys

        version_id = os.environ.get('VERSION_ID', '')
        if not version_id:
            print('No VERSION_ID'); sys.exit(0)

        locale_map = {
            'en-US':   os.environ.get('INPUT_WHATS_NEW_EN', ''),
            'zh-Hans': os.environ.get('INPUT_WHATS_NEW_ZH_HANS', ''),
            'zh-Hant': os.environ.get('INPUT_WHATS_NEW_ZH_HANT', ''),
        }

        r = subprocess.run(
            ['asc', 'version-localizations', 'list', '--version-id', version_id, '--output', 'json'],
            capture_output=True, text=True
        )
        if r.returncode != 0:
            print(f'Failed to list localizations: {r.stderr[:200]}'); sys.exit(0)

        try:
            data = json.loads(r.stdout)
            locs = data['data'] if isinstance(data, dict) and 'data' in data else data
        except Exception as e:
            print(f'JSON parse error: {e}'); sys.exit(0)

        for loc in locs:
            locale = loc.get('locale', '')
            loc_id = loc.get('id', '')
            text = locale_map.get(locale, '')
            if text and loc_id:
        res = subprocess.run(
            ['asc', 'version-localizations', 'update', '--localization-id', loc_id, '--whats-new', text],
            capture_output=True, text=True
        )
        status = '✓' if res.returncode == 0 else '✗'
        print(f'  {status} {locale}: {text[:60]}')
        if res.returncode != 0:
            print(f'    error: {res.stderr[:200]}')
        PYEOF
      env:
        INPUT_WHATS_NEW_EN: ${{ github.event.inputs.whats_new_en }}
        INPUT_WHATS_NEW_ZH_HANS: ${{ github.event.inputs.whats_new_zh_hans }}
        INPUT_WHATS_NEW_ZH_HANT: ${{ github.event.inputs.whats_new_zh_hant }}

    # ==============================================
    # 15.5 UPDATE APP STORE LISTING METADATA
    #      auto-fills name, subtitle, description, privacy URL
    # ==============================================
    - name: Update App Store listing metadata
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      continue-on-error: true
      run: |
        if [[ -z "${VERSION_ID:-}" ]]; then
          echo "No VERSION_ID from previous step — fetching now"
          VERSION_ID=$(asc versions list \
            --app-id ${{ secrets.ASC_APP_ID }} \
            --output json 2>/dev/null | \
            python3 -c "
        import sys, json
        try:
            data = json.load(sys.stdin)
            versions = data['data'] if isinstance(data, dict) and 'data' in data else data
            ordered = sorted(versions, key=lambda v: (
        0 if v.get('appStoreState') in ('PREPARE_FOR_SUBMISSION','READY_FOR_REVIEW') else 1
            ))
            print(ordered[0]['id'] if ordered else '')
        except: print('')
        " || echo "")
        fi

        APP_INFO_ID=$(asc app-infos list \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --output json 2>/dev/null | \
          python3 -c "
        import sys, json
        try:
            data = json.load(sys.stdin)
            items = data['data'] if isinstance(data, dict) and 'data' in data else data
            print(items[0]['id'] if items else '')
        except: print('')
        " || echo "")
        export APP_INFO_ID
        python3 - << 'PYEOF'
        import subprocess, json, os, sys

        app_info_id = os.environ.get('APP_INFO_ID', '')
        if not app_info_id:
            print('No APP_INFO_ID set'); sys.exit(0)

        # Metadata from APP_STORE_METADATA_LOCALE_SNIPPETS.md
        METADATA = {
            'en-US': {
        'name':       'Readori',
        'subtitle':   'Immersive Reading Companion',
        'privacyPolicyUrl': 'https://readori.github.io/privacy.html',
            },
            'zh-Hans': {
        'name':       'Readori',
        'subtitle':   '\u6c89\u6d78\u5f0f\u9605\u8bfb\u4f34\u4fa3',
        'privacyPolicyUrl': 'https://readori.github.io/privacy.html',
            },
            'zh-Hant': {
        'name':       'Readori',
        'subtitle':   '\u6c89\u6d78\u5f0f\u95b1\u8b80\u5925\u4f34',
        'privacyPolicyUrl': 'https://readori.github.io/privacy.html',
            },
        }

        r = subprocess.run(
            ['asc', 'app-info-localizations', 'list', '--app-info-id', app_info_id, '--output', 'json'],
            capture_output=True, text=True
        )
        if r.returncode != 0:
            print(f'Failed to list app-info-localizations: {r.stderr[:200]}'); sys.exit(0)

        try:
            data = json.loads(r.stdout)
            locs = data['data'] if isinstance(data, dict) and 'data' in data else data
        except Exception as e:
            print(f'JSON parse error: {e}'); sys.exit(0)

        for loc in locs:
            locale = loc.get('locale', '')
            loc_id = loc.get('id', '')
            meta = METADATA.get(locale)
            if not meta or not loc_id:
                continue
            args = ['asc', 'app-info-localizations', 'update', '--localization-id', loc_id,
            '--name', meta['name'],
            '--subtitle', meta['subtitle'],
            '--privacy-policy-url', meta['privacyPolicyUrl']]
            res = subprocess.run(args, capture_output=True, text=True)
            status = '\u2713' if res.returncode == 0 else '\u2717'
            print(f'  {status} {locale}: name/subtitle/privacy updated')
            if res.returncode != 0:
                print(f'    error: {res.stderr[:200]}')
        PYEOF

    # ==============================================
    # 16. SUBMIT FOR REVIEW (submit only)
    # ==============================================
    - name: Submit for App Store review
      if: ${{ env.MODE == 'submit' }}
      run: |
        VERSION_ID=$(asc versions list \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --output json 2>/dev/null | \
          python3 -c "
        import sys, json
        try:
            data = json.load(sys.stdin)
            versions = data['data'] if isinstance(data, dict) and 'data' in data else data
            ordered = sorted(versions, key=lambda v: (
        0 if v.get('appStoreState') == 'READY_FOR_REVIEW' else 1
            ))
            print(ordered[0]['id'] if ordered else '')
        except: print('')
        " || echo "")
        if [[ -z "$VERSION_ID" ]]; then
          echo "No version in READY_FOR_REVIEW — skipping submit"
          exit 0
        fi
        echo "Submitting version-id: $VERSION_ID"
        asc versions submit --version-id "$VERSION_ID"

    # ==============================================
    # 16.5 AUTO-CAPTURE SIMULATOR SCREENSHOTS
    #       (screenshots mode, when no pre-staged screenshots exist)
    #       Boots iPhone simulator, installs debug build, captures screens
    # ==============================================
    - name: Auto-capture simulator screenshots
      if: ${{ env.MODE == 'screenshots' }}
      continue-on-error: true
      run: |
        SCREENSHOTS_DIR="$GITHUB_WORKSPACE/screenshots_captured"
        TARGET_DIR="core_project/screenshots"

        # Skip auto-capture if screenshots already exist
        if [[ -d "$TARGET_DIR" ]] && [[ -n "$(ls -A "$TARGET_DIR" 2>/dev/null)" ]]; then
          echo "Pre-staged screenshots found at $TARGET_DIR — skipping auto-capture"
          exit 0
        fi

        # Find a suitable iPhone simulator
        UDID=$(xcrun simctl list devices available --json | \
          python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        prefer = ['iPhone 16 Pro Max','iPhone 15 Pro Max','iPhone 14 Pro Max','iPhone 13 Pro Max']
        for name in prefer:
            for rt, devs in data.get('devices',{}).items():
        for d in devs:
            if name in d.get('name','') and d.get('isAvailable'):
                print(d['udid'])
                raise SystemExit
        " 2>/dev/null || echo "")
        if [[ -z "$UDID" ]]; then
          echo "No suitable iPhone simulator found — skipping auto-capture"
          exit 0
        fi
        echo "Using simulator: $UDID"

        # Boot simulator
        xcrun simctl boot "$UDID" 2>/dev/null || true
        sleep 8

        # Build debug app for simulator
        cd "$GITHUB_WORKSPACE/core_project"
        xcodebuild build \
          -scheme                    "$SCHEME" \
          -sdk                       iphonesimulator \
          -destination               "platform=iOS Simulator,id=$UDID" \
          -jobs                      1 \
          -skipPackagePluginValidation \
          -skipMacroValidation \
          -onlyUsePackageVersionsFromResolvedFile \
          GENERATE_INFOPLIST_FILE=NO \
          INFOPLIST_FILE="Readori/Supporting/Info.plist" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          COMPILER_INDEX_STORE_ENABLE=NO \
          ENABLE_TESTABILITY=NO \
          CONFIGURATION_BUILD_DIR="/tmp/sim_build" \
          2>&1 | grep -E "^(error:|Build succeeded|BUILD FAILED)" || true

        APP_PATH=$(find /tmp/sim_build -maxdepth 2 -name "*.app" | grep -v Test | head -1)
        if [[ -z "$APP_PATH" ]]; then
          echo "No simulator .app found — skipping auto-capture"
          exit 0
        fi
        echo "App: $APP_PATH"

        # Install and launch
        xcrun simctl install "$UDID" "$APP_PATH"
        xcrun simctl launch  "$UDID" com.readori.app 2>/dev/null || true
        sleep 6

        # Capture screenshots for each device locale
        mkdir -p "$SCREENSHOTS_DIR/en-US/APP_IPHONE_67"
        mkdir -p "$SCREENSHOTS_DIR/zh-Hans/APP_IPHONE_67"

        xcrun simctl io "$UDID" screenshot \
          "$SCREENSHOTS_DIR/en-US/APP_IPHONE_67/01_main.png" 2>/dev/null || true

        # Tap Explore tab (bottom tab bar, 2nd item from left, approx coords)
        xcrun simctl io "$UDID" tap 108 940 2>/dev/null || true
        sleep 3
        xcrun simctl io "$UDID" screenshot \
          "$SCREENSHOTS_DIR/en-US/APP_IPHONE_67/02_explore.png" 2>/dev/null || true

        # Tap Settings tab
        xcrun simctl io "$UDID" tap 322 940 2>/dev/null || true
        sleep 3
        xcrun simctl io "$UDID" screenshot \
          "$SCREENSHOTS_DIR/en-US/APP_IPHONE_67/03_settings.png" 2>/dev/null || true

        # Copy en-US screenshots to zh-Hans (same app, different locale metadata)
        if [[ -d "$SCREENSHOTS_DIR/en-US/APP_IPHONE_67" ]]; then
          cp -r "$SCREENSHOTS_DIR/en-US/APP_IPHONE_67/"*.png \
            "$SCREENSHOTS_DIR/zh-Hans/APP_IPHONE_67/" 2>/dev/null || true
        fi

        # Move captured screenshots to expected location
        if [[ -n "$(ls -A "$SCREENSHOTS_DIR" 2>/dev/null)" ]]; then
          mv "$SCREENSHOTS_DIR" "$TARGET_DIR"
          echo "Auto-captured screenshots saved to $TARGET_DIR"
          find "$TARGET_DIR" -name '*.png' | sort
        fi

    # ==============================================
    # 17. SCREENSHOTS UPLOAD (screenshots mode)
    #     Directory: screenshots/<locale>/<display-type>/<filename>.png
    #     display-type = ASC enum e.g. APP_IPHONE_67, APP_IPHONE_65
    # ==============================================
    - name: Upload App Store screenshots
      if: ${{ env.MODE == 'screenshots' }}
      continue-on-error: true
      run: |
        SCREENSHOTS_DIR="core_project/screenshots"
        if [[ ! -d "$SCREENSHOTS_DIR" ]]; then
          echo "No screenshots directory found at $SCREENSHOTS_DIR — skipping"
          exit 0
        fi

        # Resolve editable version
        if [[ -z "${VERSION_ID:-}" ]]; then
          VERSION_ID=$(asc versions list \
            --app-id ${{ secrets.ASC_APP_ID }} \
            --output json 2>/dev/null | \
            python3 -c "
        import sys, json
        try:
            data = json.load(sys.stdin)
            versions = data['data'] if isinstance(data, dict) and 'data' in data else data
            ordered = sorted(versions, key=lambda v: (
        0 if v.get('appStoreState') in ('PREPARE_FOR_SUBMISSION','READY_FOR_REVIEW') else 1
            ))
            print(ordered[0]['id'] if ordered else '')
        except: print('')
        " || echo "")
        fi
        if [[ -z "$VERSION_ID" ]]; then
          echo "No editable version found — cannot upload screenshots"
          exit 1
        fi
        echo "Uploading screenshots to version-id: $VERSION_ID"

        # Build locale → localization-id map and export for Python
        LOCS_JSON=$(asc version-localizations list \
          --version-id "$VERSION_ID" --output json 2>/dev/null || echo '{}')
        export LOCS_JSON
        export VERSION_ID

        python3 - << 'PYEOF'
        import subprocess, json, os, glob, sys

        screenshots_dir = 'core_project/screenshots'
        locs_json = os.environ.get('LOCS_JSON', '{}')
        try:
            data = json.loads(locs_json)
            locs = data['data'] if isinstance(data, dict) and 'data' in data else data
        except:
            locs = []

        locale_to_id = {loc.get('locale',''): loc.get('id','') for loc in locs}
        print(f'Known localizations: {list(locale_to_id.keys())}')

        errors = 0
        for locale_dir in sorted(glob.glob(f'{screenshots_dir}/*/')):
            locale = os.path.basename(locale_dir.rstrip('/'))
            loc_id = locale_to_id.get(locale, '')
            if not loc_id:
        print(f'  skip {locale}: no localization ID found')
        continue
            print(f'  Locale: {locale}  (loc_id={loc_id})')

            for device_dir in sorted(glob.glob(f'{locale_dir}*/')):
        display_type = os.path.basename(device_dir.rstrip('/'))
        print(f'    display-type: {display_type}')

        # Create screenshot set
        r = subprocess.run(
            ['asc', 'screenshot-sets', 'create',
             '--localization-id', loc_id,
             '--display-type', display_type,
             '--output', 'json'],
            capture_output=True, text=True
        )
        if r.returncode == 0:
            try:
                d = json.loads(r.stdout)
                set_id = (d.get('data') or d).get('id', '') if isinstance(d, dict) else ''
            except:
                set_id = ''
        else:
            set_id = ''

        # If create failed, try fetching existing set
        if not set_id:
            r2 = subprocess.run(
                ['asc', 'screenshot-sets', 'list',
                 '--localization-id', loc_id,
                 '--output', 'json'],
                capture_output=True, text=True
            )
            try:
                d2 = json.loads(r2.stdout)
                sets = d2['data'] if isinstance(d2, dict) and 'data' in d2 else d2
                match = next((s for s in sets if s.get('screenshotDisplayType') == display_type), None)
                set_id = match['id'] if match else ''
            except:
                set_id = ''

        if not set_id:
            print(f'    WARNING: could not create/find set for {display_type}')
            errors += 1
            continue

        # Upload each PNG in sorted order
        imgs = sorted(glob.glob(f'{device_dir}*.png'))
        for img in imgs:
            r3 = subprocess.run(
                ['asc', 'screenshots', 'upload', '--set-id', set_id, '--file', img],
                capture_output=True, text=True
            )
            status = '\u2713' if r3.returncode == 0 else '\u2717'
            print(f'      {status} {os.path.basename(img)}')
            if r3.returncode != 0:
                print(f'        error: {r3.stderr[:200]}')
                errors += 1

        print(f'Done. Errors: {errors}')
        if errors > 0:
            sys.exit(1)
        PYEOF

    # ==============================================
    # 18. SUBSCRIPTION GROUPS — diagnostic list
    #     Runs in testflight/submit modes to confirm IAP setup
    # ==============================================
    - name: List subscription groups (diagnostic)
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      continue-on-error: true
      run: |
        echo "=== Subscription Groups ==="
        asc subscription-groups list \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --output json | \
          python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        groups = data['data'] if isinstance(data, dict) and 'data' in data else (data if isinstance(data, list) else [])
        for g in groups:
            if isinstance(g, dict):
                print(f\"  {g.get('referenceName','?')}  id={g.get('id','?')}\")
            else:
                print(f'  {g}')
        " || echo "(no subscription groups or error)"

    # ==============================================
    # 19. UPLOAD ARTIFACT (unsigned + signed modes)
    # ==============================================
    - name: Upload artifact
      if: ${{ env.MODE != 'screenshots' }}
      uses: actions/upload-artifact@v4
      with:
        name: readori-${{ env.BUILD_TAG || github.run_number }}
        retention-days: 7
        if-no-files-found: warn
        path: |
          build/*.ipa
          build/export/*.ipa
