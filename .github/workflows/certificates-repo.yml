name: certificates-repo asc-cli (PRODUCTION SAFE)

on:
  workflow_dispatch:
    inputs:
      app_scheme:
        description: "SPM / xcodebuild scheme name"
        required: false
        default: "Readori"
        type: string

      xcode_version:
        description: "Xcode version (optional)"
        required: false
        default: ""
        type: string

      run_init:
        description: "RUN INITIAL CERT GENERATION (ONLY IF CERT REPO EMPTY)"
        required: false
        default: "no"
        type: choice
        options:
          - "yes"
          - "no"

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90

    steps:

    # =========================
    # 1. SSH SETUP (TWO KEYS)
    #    PRIVATE_REPO_KEY  → github-app   → readori/readori              (read)
    #    MATCH_REPO_KEY    → github-certs → readori/readori-certificates  (write)
    # =========================
    - name: Install SSH keys
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh

        echo "${{ secrets.PRIVATE_REPO_KEY }}" > ~/.ssh/app_key
        echo "${{ secrets.MATCH_REPO_KEY }}" > ~/.ssh/match_key
        chmod 600 ~/.ssh/app_key ~/.ssh/match_key

        cat >> ~/.ssh/config << 'EOF'
        Host github-app
          HostName github.com
          User git
          IdentityFile ~/.ssh/app_key
          StrictHostKeyChecking no
          IdentitiesOnly yes

        Host github-certs
          HostName github.com
          User git
          IdentityFile ~/.ssh/match_key
          StrictHostKeyChecking no
          IdentitiesOnly yes
        EOF
        chmod 600 ~/.ssh/config

    # =========================
    # 2. CLONE PRIVATE APP
    # =========================
    - name: Clone private repo
      run: |
        git clone --depth=1 git@github-app:readori/readori.git core_project

    # =========================
    # 3. INSTALL FASTLANE
    # =========================
    - name: Install Fastlane
      run: brew install fastlane

    # =========================
    # 4. OPTIONAL XCODE
    # =========================
    - name: Select Xcode
      if: ${{ github.event.inputs.xcode_version != '' }}
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ github.event.inputs.xcode_version }}

    # =========================
    # 5. ASC API KEY JSON
    #    Fastlane Match requires --api_key_path JSON to use ASC API
    #    (env vars alone are insufficient for match spaceship override)
    # =========================
    - name: Setup App Store Connect API key
      env:
        ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_PRIVATE_KEY }}
        ASC_TEAM_ID: ${{ secrets.ASC_TEAM_ID }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys

        # Decode private key
        echo "$ASC_PRIVATE_KEY_B64" | base64 --decode \
          > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

        # Build Fastlane-compatible API key JSON
        python3 - << PYEOF
        import json, os, base64

        key_path = os.path.expanduser(
            f"~/.appstoreconnect/private_keys/AuthKey_{os.environ['ASC_KEY_ID']}.p8"
        )
        key_content = open(key_path).read()

        api_key = {
            "key_id": os.environ["ASC_KEY_ID"],
            "issuer_id": os.environ["ASC_ISSUER_ID"],
            "key": key_content,
            "in_house": False
        }
        with open("/tmp/asc_api_key.json", "w") as f:
            json.dump(api_key, f)
        print("ASC API key JSON written OK")
        PYEOF

    # =========================
    # 6. SWIFT RESOLVE
    # =========================
    - name: Resolve Swift Packages
      run: |
        cd core_project
        swift package resolve

    # =========================
    # 7. ICONS
    # =========================
    - name: Generate icons
      run: |
        if [[ -f "core_project/scripts/generate_icons.swift" ]]; then
          swift core_project/scripts/generate_icons.swift "${GITHUB_WORKSPACE}/core_project"
        fi

    # =========================
    # 8a. 🔐 INIT CERT REPO (FIRST TIME ONLY)
    #     run_init = yes → generates + stores certs (write to cert repo)
    # =========================
    - name: Initialize certificates (FIRST TIME ONLY)
      if: ${{ github.event.inputs.run_init == 'yes' }}
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        FL_NO_UPDATE_ACTION: "true"
      run: |
        cd core_project

        fastlane match appstore \
          --git_url git@github-certs:readori/readori-certificates.git \
          --type appstore \
          --app_identifier com.readori.app \
          --team_id ${{ secrets.ASC_TEAM_ID }} \
          --api_key_path /tmp/asc_api_key.json \
          --force_for_new_devices

    # =========================
    # 8b. 🚀 SAFE CERT SETUP (NORMAL RUNS)
    #     run_init = no → readonly, never modifies cert repo
    # =========================
    - name: Setup certificates (SAFE MODE)
      if: ${{ github.event.inputs.run_init == 'no' }}
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        FL_NO_UPDATE_ACTION: "true"
      run: |
        cd core_project

        fastlane match appstore \
          --git_url git@github-certs:readori/readori-certificates.git \
          --type appstore \
          --app_identifier com.readori.app \
          --team_id ${{ secrets.ASC_TEAM_ID }} \
          --api_key_path /tmp/asc_api_key.json \
          --readonly

    # =========================
    # 9. BUILD
    # =========================
    - name: Build IPA
      run: |
        mkdir -p build
        cd core_project

        chmod +x scripts/build_unsigned_ipa.sh

        ./scripts/build_unsigned_ipa.sh \
          "${{ github.event.inputs.app_scheme }}" \
          "${GITHUB_WORKSPACE}/build"

    # =========================
    # 10. OUTPUT CHECK
    # =========================
    - name: Show output
      run: ls -R build || true

    # =========================
    # 11. ARTIFACT
    # =========================
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: build/*.ipa
