name: certificates-repo asc-cli (PRODUCTION SAFE)

on:
  workflow_dispatch:
    inputs:
      app_scheme:
        description: "SPM / xcodebuild scheme name"
        required: false
        default: "Readori"
        type: string

      xcode_version:
        description: "Xcode version (optional)"
        required: false
        default: ""
        type: string

      run_init:
        description: "RUN INITIAL CERT GENERATION (ONLY IF CERT REPO EMPTY)"
        required: false
        default: "no"
        type: choice
        options:
          - "yes"
          - "no"

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90

    steps:

    # =========================
    # 1. SSH SETUP
    # =========================
    - name: Install SSH Key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.PRIVATE_REPO_KEY }}
        known_hosts: github.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK3pzfEjVuG0d+XmQYsvcsXXMU3K0RTGmi5mKVp+dLAx

    # =========================
    # 2. CLONE PRIVATE APP
    # =========================
    - name: Clone private repo
      run: |
        git clone --depth=1 git@github.com:readori/readori.git core_project

    # =========================
    # 3. INSTALL FASTLANE
    # =========================
    - name: Install Fastlane
      run: brew install fastlane

    # =========================
    # 4. OPTIONAL XCODE
    # =========================
    - name: Select Xcode
      if: ${{ github.event.inputs.xcode_version != '' }}
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ github.event.inputs.xcode_version }}

    # =========================
    # 5. SWIFT RESOLVE
    # =========================
    - name: Resolve Swift Packages
      run: |
        cd core_project
        swift package resolve

    # =========================
    # 6. ICONS
    # =========================
    - name: Generate icons
      run: |
        if [[ -f "core_project/scripts/generate_icons.swift" ]]; then
          swift core_project/scripts/generate_icons.swift "${GITHUB_WORKSPACE}/core_project"
        fi

    # =========================
    # 7. 🚀 SAFE CERT SETUP (NO INIT)
    # =========================
    - name: Setup certificates (SAFE MODE)
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      run: |
        cd core_project

        fastlane match appstore \
          --git_url git@github.com:readori/readori-certificates.git \
          --type appstore \
          --readonly

    # =========================
    # 8. BUILD
    # =========================
    - name: Build IPA
      run: |
        mkdir -p build
        cd core_project

        chmod +x scripts/build_unsigned_ipa.sh

        ./scripts/build_unsigned_ipa.sh \
          "${{ github.event.inputs.app_scheme }}" \
          "${GITHUB_WORKSPACE}/build"

    # =========================
    # 9. OUTPUT CHECK
    # =========================
    - name: Show output
      run: ls -R build || true

    # =========================
    # 10. ARTIFACT
    # =========================
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: build/*.ipa
