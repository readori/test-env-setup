name: certificates-repo asc-cli (PRODUCTION SAFE)

on:
  workflow_dispatch:
    inputs:
      app_scheme:
        description: "SPM / xcodebuild scheme name"
        required: false
        default: "Readori"
        type: string

      xcode_version:
        description: "Xcode version (optional)"
        required: false
        default: ""
        type: string

      run_init:
        description: "RUN INITIAL CERT GENERATION (ONLY IF CERT REPO EMPTY)"
        required: false
        default: "no"
        type: choice
        options:
          - "yes"
          - "no"

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 90

    steps:

    # =========================
    # 1. SSH SETUP (TWO KEYS)
    #    PRIVATE_REPO_KEY  → github-app  → readori/readori        (read)
    #    MATCH_REPO_KEY    → github-certs → readori/readori-certificates (write)
    # =========================
    - name: Install SSH keys
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh

        echo "${{ secrets.PRIVATE_REPO_KEY }}" > ~/.ssh/app_key
        echo "${{ secrets.MATCH_REPO_KEY }}" > ~/.ssh/match_key
        chmod 600 ~/.ssh/app_key ~/.ssh/match_key

        cat >> ~/.ssh/config << 'EOF'
        Host github-app
          HostName github.com
          User git
          IdentityFile ~/.ssh/app_key
          StrictHostKeyChecking no
          IdentitiesOnly yes

        Host github-certs
          HostName github.com
          User git
          IdentityFile ~/.ssh/match_key
          StrictHostKeyChecking no
          IdentitiesOnly yes
        EOF
        chmod 600 ~/.ssh/config

    # =========================
    # 2. CLONE PRIVATE APP
    # =========================
    - name: Clone private repo
      run: |
        git clone --depth=1 git@github-app:readori/readori.git core_project

    # =========================
    # 3. INSTALL FASTLANE
    # =========================
    - name: Install Fastlane
      run: brew install fastlane

    # =========================
    # 4. OPTIONAL XCODE
    # =========================
    - name: Select Xcode
      if: ${{ github.event.inputs.xcode_version != '' }}
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ github.event.inputs.xcode_version }}

    # =========================
    # 5. ASC API KEY SETUP
    #    Required for Fastlane Match to talk to Apple Developer Portal
    # =========================
    - name: Setup App Store Connect API key
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "${{ secrets.ASC_PRIVATE_KEY }}" | base64 --decode \
          > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

    # =========================
    # 6. SWIFT RESOLVE
    # =========================
    - name: Resolve Swift Packages
      run: |
        cd core_project
        swift package resolve

    # =========================
    # 7. ICONS
    # =========================
    - name: Generate icons
      run: |
        if [[ -f "core_project/scripts/generate_icons.swift" ]]; then
          swift core_project/scripts/generate_icons.swift "${GITHUB_WORKSPACE}/core_project"
        fi

    # =========================
    # 8a. 🔐 INIT CERT REPO (FIRST TIME ONLY)
    #     run_init = yes → generates + stores certs (write to cert repo)
    # =========================
    - name: Initialize certificates (FIRST TIME ONLY)
      if: ${{ github.event.inputs.run_init == 'yes' }}
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        APP_STORE_CONNECT_API_KEY_KEY_FILEPATH: ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
      run: |
        cd core_project

        fastlane match appstore \
          --git_url git@github-certs:readori/readori-certificates.git \
          --type appstore \
          --app_identifier com.readori.app \
          --team_id ${{ secrets.ASC_TEAM_ID }} \
          --force_for_new_devices

    # =========================
    # 8b. 🚀 SAFE CERT SETUP (NORMAL RUNS)
    #     run_init = no → readonly, never modifies cert repo
    # =========================
    - name: Setup certificates (SAFE MODE)
      if: ${{ github.event.inputs.run_init == 'no' }}
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        APP_STORE_CONNECT_API_KEY_KEY_FILEPATH: ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
      run: |
        cd core_project

        fastlane match appstore \
          --git_url git@github-certs:readori/readori-certificates.git \
          --type appstore \
          --app_identifier com.readori.app \
          --team_id ${{ secrets.ASC_TEAM_ID }} \
          --readonly

    # =========================
    # 9. BUILD
    # =========================
    - name: Build IPA
      run: |
        mkdir -p build
        cd core_project

        chmod +x scripts/build_unsigned_ipa.sh

        ./scripts/build_unsigned_ipa.sh \
          "${{ github.event.inputs.app_scheme }}" \
          "${GITHUB_WORKSPACE}/build"

    # =========================
    # 10. OUTPUT CHECK
    # =========================
    - name: Show output
      run: ls -R build || true

    # =========================
    # 11. ARTIFACT
    # =========================
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: build/*.ipa
