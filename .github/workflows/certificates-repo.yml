name: certificates-repo asc-cli (INIT MATCH SETUP)

on:
  workflow_dispatch:
    inputs:
      app_scheme:
        description: "SPM / xcodebuild scheme name"
        required: false
        default: "Readori"
        type: string

      xcode_version:
        description: "Xcode version (optional)"
        required: false
        default: ""
        type: string

      run_init:
        description: "Run MATCH INIT (ONLY FIRST TIME)"
        required: false
        default: "yes"
        type: choice
        options:
          - "yes"
          - "no"

permissions:
  contents: read

concurrency:
  group: build-init-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build-and-init:
    runs-on: macos-14
    timeout-minutes: 90

    steps:

    # =====================================================
    # 1. SSH (PRIVATE REPO ACCESS)
    # =====================================================
    - name: Install SSH Key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.PRIVATE_REPO_KEY }}
        known_hosts: github.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK3pzfEjVuG0d+XmQYsvcsXXMU3K0RTGmi5mKVp+dLAx

    # =====================================================
    # 2. Clone PRIVATE APP REPO
    # =====================================================
    - name: Clone private repository
      run: |
        git clone --depth=1 git@github.com:readori/readori.git core_project
        echo "Cloned core repo"

    # =====================================================
    # 3. Install tools
    # =====================================================
    - name: Install Fastlane
      run: |
        brew install fastlane

    # =====================================================
    # 4. OPTIONAL XCODE SWITCH
    # =====================================================
    - name: Select Xcode
      if: ${{ github.event.inputs.xcode_version != '' }}
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ github.event.inputs.xcode_version }}

    # =====================================================
    # 5. SWIFT PACKAGE RESOLVE
    # =====================================================
    - name: Resolve Swift Packages
      run: |
        cd core_project
        swift package resolve

    # =====================================================
    # 6. ICON GENERATION (OPTIONAL)
    # =====================================================
    - name: Generate icons
      run: |
        if [[ -f "core_project/scripts/generate_icons.swift" ]]; then
          swift core_project/scripts/generate_icons.swift "${GITHUB_WORKSPACE}/core_project"
        fi

    # =====================================================
    # 7. 🚨 MATCH INIT (ONE-TIME ONLY)
    # =====================================================
    - name: INIT FASTLANE MATCH (DO NOT REUSE)
      if: ${{ github.event.inputs.run_init == 'yes' }}
      run: |
        brew install fastlane

        cd core_project

        fastlane match init

    # =====================================================
    # 8. MATCH GENERATE CERTIFICATES
    # =====================================================
    - name: GENERATE CERTIFICATES (APPSTORE)
      if: ${{ github.event.inputs.run_init == 'yes' }}
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      run: |
        cd core_project

        fastlane match appstore \
          --git_url git@github.com:readori/readori-certificates.git \
          --type appstore

    # =====================================================
    # 9. BUILD (YOUR EXISTING SYSTEM)
    # =====================================================
    - name: Build unsigned IPA
      run: |
        mkdir -p build
        cd core_project

        chmod +x scripts/build_unsigned_ipa.sh

        ./scripts/build_unsigned_ipa.sh \
          "${{ github.event.inputs.app_scheme }}" \
          "${GITHUB_WORKSPACE}/build"

    # =====================================================
    # 10. DEBUG OUTPUT
    # =====================================================
    - name: Show output
      run: |
        ls -R build || true

    # =====================================================
    # 11. ARTIFACT UPLOAD
    # =====================================================
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: init-build
        path: |
          build/*.ipa
