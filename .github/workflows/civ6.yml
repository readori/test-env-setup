name: Readori CI v6 (Stable Industrial)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "unsigned | testflight | submit | screenshots | ai-screenshots"
        default: "unsigned"
        type: choice
        options:
          - unsigned
          - testflight
          - submit
          - screenshots
          - ai-screenshots

      app_scheme:
        default: "Readori"
        type: string

      app_version:
        default: "1.0.0"
        type: string

      beta_notes:
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14

    env:
      MODE: ${{ github.event.inputs.mode }}
      SCHEME: ${{ github.event.inputs.app_scheme }}
      APP_VERSION: ${{ github.event.inputs.app_version }}

    steps:

    # =========================
    # SSH SETUP
    # =========================
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.PRIVATE_REPO_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan github.com >> ~/.ssh/known_hosts

    # =========================
    # CLONE REPO
    # =========================
    - name: Clone repository
      run: |
        git clone --depth=1 git@github.com:readori/readori.git core_project

    # =========================
    # INSTALL TOOLS
    # =========================
    - name: Install tools
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        brew install fastlane
        brew tap tddworks/tap
        brew install asccli

    # =========================
    # ASC AUTH
    # =========================
    - name: ASC auth
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "${{ secrets.ASC_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

        asc auth login \
          --key-id ${{ secrets.ASC_KEY_ID }} \
          --issuer-id ${{ secrets.ASC_ISSUER_ID }} \
          --private-key-path ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

    # =========================
    # BUILD NUMBER
    # =========================
    - name: Generate build number
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        BN=$(asc builds list --app-id ${{ secrets.ASC_APP_ID }} --output json | python3 -c "import sys,json; b=json.load(sys.stdin); nums=[int(x.get('buildNumber')) for x in b if x.get('buildNumber') and str(x.get('buildNumber')).isdigit()]; print(max(nums)+1 if nums else 1)")
        echo "BUILD_NUMBER=$BN" >> $GITHUB_ENV
        echo "BUILD_NUMBER=$BN"

    # =========================
    # MATCH (CERTS)
    # =========================
    - name: Install certificates
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      run: |
        cd core_project

        fastlane match appstore \
          --git_url git@github.com:readori/readori-certificates.git \
          --type appstore \
          --readonly

    # =========================
    # BUILD IPA (FIXED SAFE BLOCK)
    # =========================
    - name: Build IPA
      shell: bash
      run: |
        set -e

        mkdir -p build
        cd core_project

        if [[ "$MODE" == "unsigned" ]]; then
          chmod +x scripts/build_unsigned_ipa.sh
          ./scripts/build_unsigned_ipa.sh "$SCHEME" "$GITHUB_WORKSPACE/build"
          exit 0
        fi

        fastlane gym \
          --scheme "$SCHEME" \
          --output_directory "$GITHUB_WORKSPACE/build" \
          --export_method app-store \
          --xcargs "CURRENT_PROJECT_VERSION=${BUILD_NUMBER} MARKETING_VERSION=${APP_VERSION}"

    # =========================
    # UPLOAD IPA
    # =========================
    - name: Upload build
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        IPA=$(find build -name "*.ipa" | head -1)

        asc builds upload \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --file "$IPA" \
          --version "$APP_VERSION" \
          --build-number "$BUILD_NUMBER"

    # =========================
    # WAIT BUILD READY (FIXED SAFE LOOP)
    # =========================
    - name: Wait build ready
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        for i in {1..20}; do
          ID=$(asc builds list --app-id ${{ secrets.ASC_APP_ID }} --output json | python3 -c "import sys,json; b=json.load(sys.stdin); t='${BUILD_NUMBER}'; m=[x for x in b if str(x.get('buildNumber') or x.get('version'))==t]; print(m[0]['id'] if m else '')")

          if [[ -n "$ID" ]]; then
            echo "BUILD_ID=$ID" >> $GITHUB_ENV
            echo "FOUND BUILD: $ID"
            exit 0
          fi

          echo "Waiting build..."
          sleep 15
        done

        echo "FAILED: build not found"
        exit 1

    # =========================
    # BETA NOTES
    # =========================
    - name: Beta notes
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        if [[ -n "${{ github.event.inputs.beta_notes }}" ]]; then
          asc builds update-beta-notes \
            --build-id "$BUILD_ID" \
            --whats-new "${{ github.event.inputs.beta_notes }}"
        fi

    # =========================
    # SUBMIT APP
    # =========================
    - name: Submit app
      if: ${{ env.MODE == 'submit' }}
      run: |
        VERSION_ID=$(asc versions list --app-id ${{ secrets.ASC_APP_ID }} --output json | python3 -c "import sys,json; v=json.load(sys.stdin); print(v[0]['id'] if v else '')")

        asc versions submit --version-id "$VERSION_ID"

    # =========================
    # AI SCREENSHOTS (PLACEHOLDER SAFE)
    # =========================
    - name: AI Screenshots (placeholder)
      if: ${{ env.MODE == 'ai-screenshots' }}
      run: |
        echo "AI screenshot pipeline placeholder"
        mkdir -p core_project/screenshots/en-US/iPhone_6.7
        echo "NO IMAGE GENERATION IN CI YET"

    # =========================
    # SCREENSHOTS UPLOAD
    # =========================
    - name: Upload screenshots
      if: ${{ env.MODE == 'screenshots' }}
      run: |
        SCREENSHOTS_DIR="core_project/screenshots"

        if [[ ! -d "$SCREENSHOTS_DIR" ]]; then
          echo "No screenshots directory"
          exit 0
        fi

        VERSION_ID=$(asc versions list --app-id ${{ secrets.ASC_APP_ID }} --output json | python3 -c "import sys,json; v=json.load(sys.stdin); print(v[0]['id'] if v else '')")

        for locale_dir in "$SCREENSHOTS_DIR"/*/; do
          locale=$(basename "$locale_dir")

          for device_dir in "$locale_dir"*/; do
            device=$(basename "$device_dir")

            SET_ID=$(asc screenshot-sets create \
              --version-id "$VERSION_ID" \
              --locale "$locale" \
              --display-target "$device" \
              --output json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" || true)

            if [[ -z "$SET_ID" ]]; then
              SET_ID=$(asc screenshot-sets list \
                --version-id "$VERSION_ID" \
                --locale "$locale" \
                --display-target "$device" \
                --output json | python3 -c "import sys,json; s=json.load(sys.stdin); print(s[0]['id'] if s else '')")
            fi

            for img in $(ls "$device_dir"*.png 2>/dev/null | sort); do
              asc screenshots upload \
                --set-id "$SET_ID" \
                --file "$img"
            done

          done
        done

    # =========================
    # ARTIFACT
    # =========================
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: ${{ env.MODE != 'screenshots' }}
      with:
        name: readori-build-v6
        path: build/*.ipa
