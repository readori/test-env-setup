name: Readori CI v6 (AI Industrial Stable)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "unsigned | testflight | submit | screenshots | ai-screenshots"
        default: "unsigned"
        type: choice
        options:
          - unsigned
          - testflight
          - submit
          - screenshots
          - ai-screenshots

      app_scheme:
        default: "Readori"
        type: string

      app_version:
        default: "1.0.0"
        type: string

      beta_notes:
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14

    env:
      MODE: ${{ github.event.inputs.mode }}
      SCHEME: ${{ github.event.inputs.app_scheme }}
      APP_VERSION: ${{ github.event.inputs.app_version }}

    steps:

    # =========================
    # SSH
    # =========================
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.PRIVATE_REPO_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan github.com >> ~/.ssh/known_hosts

    # =========================
    # Clone
    # =========================
    - name: Clone repository
      run: |
        git clone --depth=1 git@github.com:readori/readori.git core_project

    # =========================
    # Install tools
    # =========================
    - name: Install tools
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        brew install fastlane
        brew tap tddworks/tap
        brew install asccli

    # =========================
    # ASC auth
    # =========================
    - name: ASC auth
      if: ${{ env.MODE != 'unsigned' }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys

        echo "${{ secrets.ASC_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

        asc auth login \
          --key-id ${{ secrets.ASC_KEY_ID }} \
          --issuer-id ${{ secrets.ASC_ISSUER_ID }} \
          --private-key-path ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

    # =========================
    # Build number
    # =========================
    - name: Generate build number
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        BN=$(asc builds list --app-id ${{ secrets.ASC_APP_ID }} --output json \
        | python3 - << 'EOF'
import sys, json
data = json.load(sys.stdin)

nums = []
for b in data:
    v = b.get("buildNumber") or b.get("version")
    if v and str(v).isdigit():
        nums.append(int(v))

print(max(nums)+1 if nums else 1)
EOF
)
        echo "BUILD_NUMBER=$BN" >> $GITHUB_ENV

    # =========================
    # Match
    # =========================
    - name: Match certificates
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        cd core_project

        fastlane match appstore \
          --git_url git@github.com:readori/readori-certificates.git \
          --type appstore \
          --readonly

    # =========================
    # Build IPA
    # =========================
    - name: Build IPA
      run: |
        mkdir -p build
        cd core_project

        if [[ "$MODE" == "unsigned" ]]; then
          chmod +x scripts/build_unsigned_ipa.sh
          ./scripts/build_unsigned_ipa.sh "$SCHEME" "$GITHUB_WORKSPACE/build"
        else
          fastlane gym \
            --scheme "$SCHEME" \
            --output_directory "$GITHUB_WORKSPACE/build" \
            --export_method app-store \
            --clean \
            --xcargs "CURRENT_PROJECT_VERSION=${BUILD_NUMBER} MARKETING_VERSION=${APP_VERSION}"
        fi

    # =========================
    # Upload IPA
    # =========================
    - name: Upload build
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        IPA=$(find build -name "*.ipa" | head -1)

        asc builds upload \
          --app-id ${{ secrets.ASC_APP_ID }} \
          --file "$IPA" \
          --version "$APP_VERSION" \
          --build-number "$BUILD_NUMBER"

    # =========================
    # Wait build ready
    # =========================
    - name: Wait build ready
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        for i in {1..20}; do
          ID=$(asc builds list --app-id ${{ secrets.ASC_APP_ID }} --output json \
          | python3 - << 'EOF'
import sys, json, os
data = json.load(sys.stdin)
target = os.environ.get("BUILD_NUMBER")

for b in data:
    if str(b.get("buildNumber") or b.get("version")) == str(target):
        print(b.get("id",""))
        break
EOF
)

          if [[ -n "$ID" ]]; then
            echo "BUILD_ID=$ID" >> $GITHUB_ENV
            exit 0
          fi

          echo "Waiting build..."
          sleep 15
        done

        exit 1

    # =========================
    # Beta notes
    # =========================
    - name: Beta notes
      if: ${{ env.MODE == 'testflight' || env.MODE == 'submit' }}
      run: |
        if [[ -n "${{ github.event.inputs.beta_notes }}" ]]; then
          asc builds update-beta-notes \
            --build-id "$BUILD_ID" \
            --whats-new "${{ github.event.inputs.beta_notes }}"
        fi

    # =========================
    # Submit
    # =========================
    - name: Submit app
      if: ${{ env.MODE == 'submit' }}
      run: |
        VERSION_ID=$(asc versions list --app-id ${{ secrets.ASC_APP_ID }} --output json \
        | python3 - << 'EOF'
import sys, json
v = json.load(sys.stdin)
print(v[0]["id"] if v else "")
EOF
)

        asc versions submit --version-id "$VERSION_ID"

    # =========================
    # AI Screenshots
    # =========================
    - name: AI Screenshot generation
      if: ${{ env.MODE == 'ai-screenshots' }}
      run: |
        python3 - << 'EOF'
import os, json

root = "core_project/screenshots"
os.makedirs("build", exist_ok=True)

result = {}

if os.path.exists(root):
    for locale in os.listdir(root):
        lp = os.path.join(root, locale)
        if not os.path.isdir(lp):
            continue

        result[locale] = {}

        for device in os.listdir(lp):
            dp = os.path.join(lp, device)
            if not os.path.isdir(dp):
                continue

            files = sorted([f for f in os.listdir(dp) if f.endswith(".png")])

            result[locale][device] = [
                {
                    "file": f,
                    "title": f.replace(".png","").replace("_"," "),
                    "ai_caption": f"Showcase feature: {f}"
                }
                for f in files
            ]

with open("build/ai_screenshots.json","w") as f:
    json.dump(result,f,indent=2)

print("AI screenshots generated")
EOF

    # =========================
    # Upload screenshots
    # =========================
    - name: Upload screenshots
      if: ${{ env.MODE == 'screenshots' || env.MODE == 'ai-screenshots' }}
      run: |
        SCREENSHOTS_DIR="core_project/screenshots"

        VERSION_ID=$(asc versions list --app-id ${{ secrets.ASC_APP_ID }} --output json \
        | python3 - << 'EOF'
import sys,json
v=json.load(sys.stdin)
print(v[0]["id"] if v else "")
EOF
)

        for locale in "$SCREENSHOTS_DIR"/*; do
          [ -d "$locale" ] || continue
          locale_name=$(basename "$locale")

          for device in "$locale"/*; do
            [ -d "$device" ] || continue
            device_name=$(basename "$device")

            SET_ID=$(asc screenshot-sets create \
              --version-id "$VERSION_ID" \
              --locale "$locale_name" \
              --display-target "$device_name" \
              --output json 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" \
              || true)

            if [[ -z "$SET_ID" ]]; then
              SET_ID=$(asc screenshot-sets list \
                --version-id "$VERSION_ID" \
                --locale "$locale_name" \
                --display-target "$device_name" \
                --output json \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['id'] if d else '')")
            fi

            for img in $(ls "$device"/*.png 2>/dev/null | sort); do
              asc screenshots upload \
                --set-id "$SET_ID" \
                --file "$img"
            done
          done
        done

    # =========================
    # Artifact
    # =========================
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: readori-build
        path: build/**
